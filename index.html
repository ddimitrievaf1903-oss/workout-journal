<html lang="ru">
<head>

  <style>
    body {

      background: #f2f2f7;
      margin: 0;
      color: #111;
    }

    .container {
      max-width: 420px;
      margin: auto;
      padding: 16px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 12px;
      margin-bottom: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      position: relative;
      transition: transform 0.15s ease, opacity 0.15s ease, box-shadow 0.15s ease;
    }

    .card.dragging {
      opacity: 0.65;
      transform: scale(1.02);
      box-shadow: 0 10px 24px rgba(0,0,0,0.12);
    }

    .done {
      background: #e8f8ee;
    }

    .special {
      background: #e6f0ff;
    }

    .extra {
      background: #e8f8ee;
    }

    .exercise-img {
      width: 100%;
      height: 150px;

      border-radius: 12px;
      margin-top: 8px;
      display: block;
    }

    button {
      padding: 6px 8px;
      border: none;
      border-radius: 8px;
      background: #007aff;
      color: #fff;
      cursor: pointer;
      font-size: 14px;
    }

    button:active {
      transform: scale(0.98);
    }

    .small {
      font-size: 12px;

    }

    .green {
      background: #34c759;
    }

    .red {
      background: #ff3b30;
    }

    .yellow {

    .bigBtn {

    .row {

    .title {
      font-size: 22px;
      font-weight: 600;

    .setRow {

      margin-top: 4px;
      font-size: 14px;
    }

    .plus {
      color: #34c759;
      font-weight: 700;
    }

    .minus {
      color: #ff3b30;

    }

    .infoBtn {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;

      background: #e5e5ea;
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 6px 8px;
      font-size: 13px;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s ease;
      z-index: 999;
      padding: 16px;
    }

    .modal.show {
      background: rgba(0,0,0,0.3);
    }

    .modalBox {
      background: #fff;
      padding: 16px;
      border-radius: 16px;
      width: 100%;
      max-width: 360px;
      transform: translateY(20px);
      opacity: 0;
      transition: transform 0.2s ease, opacity 0.2s ease;
      max-height: 80vh;
      overflow: auto;
    }

    .modal.show .modalBox {
      transform: translateY(0);
      opacity: 1;

      padding: 8px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

      padding: 8px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
      width: 100%;
      box-sizing: border-box;
      resize: vertical;
      min-height: 100px;

    .calendarWrap {

    }

    .calendarHeader {

      align-items: center;
      justify-content: space-between;

    }

    .calendarTitle {

      font-weight: 600;
    }

    .calendarGrid {

      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
    }

    .weekday {
      text-align: center;
      font-size: 12px;
      color: #666;
      padding: 4px 0 6px;
      font-weight: 600;
    }

    .dayCell {
      min-height: 58px;
      background: #f8f8fa;
      border-radius: 12px;
      padding: 6px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      cursor: pointer;
      border: 1px solid transparent;
    }

    .dayCell:hover {
      border-color: #d9d9de;
    }

    .dayCell.outsideMonth {
      opacity: 0.45;
    }

    .dayCell.today {
      background: #eef5ff;
      border-color: #007aff;
      box-shadow: inset 0 0 0 1px #007aff;
    }

    .dayNumber {
      font-size: 13px;
      font-weight: 600;
      text-align: right;
    }

    .dayDots {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      justify-content: flex-start;
      align-items: center;
      min-height: 10px;
    }

    .dayDot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.08);
    }

    .modalSectionTitle {
      margin-top: 12px;
      margin-bottom: 6px;
      font-size: 14px;
      font-weight: 600;
      color: #444;
    }

    .emptyText {
      color: #777;
      font-size: 13px;
      margin-top: 6px;
    }

    .colorPicker {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 8px;
    }

    .colorOption {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.08);
    }

    .colorOption.active {
      border-color: #111;
    }

    .colorPreviewRow {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .noteTitle {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 6px;
      padding-right: 72px;
    }

    .notePreview {
      font-size: 13px;
      color: #555;
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .noteTopActions {
      position: absolute;
      top: 10px;
      right: 10px;
      display: flex;
      gap: 6px;
    }

    .pinBadge {
      display: inline-block;
      font-size: 11px;
      color: #666;
      margin-bottom: 6px;
    }

    .searchInput {
      width: 100%;
      box-sizing: border-box;
    }
  </style>
</head>
