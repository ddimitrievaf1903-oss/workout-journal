<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Журнал тренировок</title>

<style>
body{font-family:-apple-system;background:#f2f2f7;margin:0}
.container{max-width:420px;margin:auto;padding:16px}
.card{background:#fff;border-radius:16px;padding:12px;margin-bottom:12px}
button{padding:6px 8px;border:none;border-radius:8px;background:#007aff;color:#fff}
</style>
</head>

<body>

<div class="container" id="app"></div>

<script>

let data = JSON.parse(localStorage.getItem('workouts')) || [];

function save(){
  localStorage.setItem('workouts', JSON.stringify(data));
}

function home(){
  document.getElementById('app').innerHTML = `
    <h2>Тренировки</h2>
    <input id="nw">
    <button onclick="add()">Добавить</button>
    <div id="list"></div>
  `;

  const list = document.getElementById('list');

  data.forEach((w,i)=>{
    const d = document.createElement('div');
    d.className='card';
    d.innerHTML = w.name;
    list.appendChild(d);
  });
}

function add(){
  const v=document.getElementById('nw').value;
  if(!v)return;

  data.push({name:v});
  save();
  home();
}

home();

</script>

</body>
</html>
