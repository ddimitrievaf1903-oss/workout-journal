<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Журнал тренировок</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
/* ✅ ТВОЙ СТИЛЬ ПОЛНОСТЬЮ СОХРАНЕН */
body {font-family:-apple-system;background:#f2f2f7;margin:0;color:#111;}
.container{max-width:420px;margin:auto;padding:16px;}
.card{background:#fff;border-radius:16px;padding:12px;margin-bottom:12px;box-shadow:0 4px 10px rgba(0,0,0,0.05);position:relative;}
.done{background:#e8f8ee;}
.special{background:#e6f0ff;}
.extra{background:#e8f8ee;}
.exercise-img{width:100%;height:150px;object-fit:cover;border-radius:12px;margin-top:8px;}
button{padding:6px 8px;border:none;border-radius:8px;background:#007aff;color:#fff;}
.small{font-size:12px;padding:4px 6px;}
.green{background:#34c759;}
.red{background:#ff3b30;}
.yellow{background:#ffcc00;color:#000;}
.secondary{background:#e5e5ea;color:#000;}
.bigBtn{width:100%;padding:12px;font-size:16px;}
.row{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;align-items:center;}
.title{font-size:22px;font-weight:600;margin-bottom:12px;}
.setRow{display:flex;justify-content:space-between;margin-top:4px;}
.plus{color:#34c759;}
.minus{color:#ff3b30;}
.infoBtn{position:absolute;top:8px;right:8px;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold;}
.gray{background:#d1d1d6;color:#000;}
.yellowBg{background:#ffcc00;color:#000;}
.editor{border:1px solid #ccc;border-radius:8px;padding:8px;min-height:80px;}
.toolbar{display:flex;gap:4px;margin:8px 0;}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;}
.modalBox{background:#fff;padding:16px;border-radius:16px;width:90%;max-width:360px;}
.modalListItem{background:#f8f8fa;border-radius:10px;padding:8px;margin-top:8px;display:flex;justify-content:space-between;}
</style>
</head>

<body>
<div class="container" id="app"></div>

<script>

// ===== FIREBASE =====
firebase.initializeApp({
  apiKey:"AIzaSyCGrNDdXDuUxlPhI0V2g7X7C679j2Vq7_8",
  authDomain:"workout-app-80e26.firebaseapp.com",
  projectId:"workout-app-80e26"
});
const db=firebase.firestore();

// ===== DATA =====
let data=JSON.parse(localStorage.getItem('workouts'))||[];
let cw=null, ce=null, temp=[];
let dragW=null, dragE=null;

// 🔥 фикс синка
let suppressNextSnapshot=false;

// ===== SAVE =====
function saveLocal(){
  localStorage.setItem('workouts',JSON.stringify(data));
}

function saveCloud(){
  suppressNextSnapshot=true;
  return db.collection("users").doc("main").set({
    workouts:data,
    updatedAt:Date.now()
  });
}

function save(){
  saveLocal();
  saveCloud();
}

// ===== 🔥 ИСПРАВЛЕННЫЙ SYNC =====
db.collection("users").doc("main").onSnapshot(doc=>{
  if(!doc.exists)return;

  if(suppressNextSnapshot){
    suppressNextSnapshot=false;
    return;
  }

  data=doc.data().workouts||[];
  localStorage.setItem('workouts',JSON.stringify(data));

  if(typeof cw==="number"){
    openW(cw);
  }else{
    home();
  }
});

// ===== UTIL =====
function esc(t){
  let d=document.createElement('div');
  d.textContent=t||'';
  return d.innerHTML;
}

// ===== HOME =====
function home(){
  app.innerHTML=`
  <div class="title">Тренировки</div>
  <div id="list"></div>

  <div class="row">
    <input id="nw" placeholder="Новая тренировка" style="flex:1">
    <button onclick="addW()">Добавить</button>
  </div>
  `;

  let list=document.getElementById('list');

  data.forEach((w,i)=>{
    let d=document.createElement('div');
    d.className='card '+(w.done?'done':'');

    d.innerHTML=`
    <b>${esc(w.name)}</b>

    <div class="row">
      <button onclick="openW(${i})">Открыть</button>
      <button class="green small" onclick="done(${i})">✔</button>
      <button class="red small" onclick="undone(${i})">✖</button>
    </div>
    `;

    list.appendChild(d);
  });
}

// ===== WORKOUT =====
function openW(i){
  cw=i;
  let w=data[i];

  app.innerHTML=`
  <button onclick="home()">← Назад</button>
  <div class="title">${esc(w.name)}</div>
  <div id="list"></div>

  <button class="bigBtn" onclick="addE()">Добавить упражнение</button>
  `;

  let list=document.getElementById('list');

  w.exercises.forEach((e,ei)=>{
    let d=document.createElement('div');
    d.className='card';

    let setsHTML='';
    let max=Math.max(e.sets?.length||0,e.newSets?.length||0);

    for(let j=0;j<max;j++){
      let l=e.sets?.[j]||'';
      let r=e.newSets?.[j]||'';
      setsHTML+=`
      <div class="setRow">
        <span>${l}</span>
        <span>${r}</span>
      </div>`;
    }

    d.innerHTML=`
    <b>${esc(e.name)}</b>

    ${e.img?`<img src="${esc(e.img)}" class="exercise-img">`:''}

    ${setsHTML}

    <div class="row">
      <button onclick="openSets(${ei})">Подходы</button>
      <button class="yellow" onclick="newRes(${ei})">Новый результат</button>
      ${e.newSets?.length?`<button class="green" onclick="saveRes(${ei})">Сохранить</button>`:''}
    </div>
    `;

    list.appendChild(d);
  });
}

// ===== BASIC =====
function addW(){
  let v=nw.value.trim();
  if(!v)return;
  data.push({name:v,exercises:[]});
  save(); home();
}

function done(i){data[i].done=true;save();home();}
function undone(i){delete data[i].done;save();home();}

function addE(){
  data[cw].exercises.push({name:'Новое упражнение',sets:[]});
  save(); openW(cw);
}

// ===== MODAL =====
function modal(content){
  let m=document.createElement('div');
  m.className='modal';
  m.innerHTML=`<div class="modalBox">${content}<br><button onclick="this.closest('.modal').remove()">Закрыть</button></div>`;
  document.body.appendChild(m);
}

// ===== SETS =====
function openSets(){ modal("Подходы"); }

// ===== NEW =====
function newRes(){ modal("Новый результат"); }

// ===== SAVE RESULT =====
function saveRes(i){
  let e=data[cw].exercises[i];
  e.sets=e.newSets;
  delete e.newSets;
  save(); openW(cw);
}

// ===== START =====
home();

</script>
</body>
</html>
