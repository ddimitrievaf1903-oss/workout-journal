<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Журнал тренировок</title>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <style>
    :root{
      --bg:#f2f2f7;
      --card:#ffffff;
      --text:#111111;
      --muted:#6e6e73;
      --blue:#007aff;
      --green:#34c759;
      --red:#ff3b30;
      --yellow:#ffcc00;
      --soft:#e5e5ea;
      --soft2:#f8f8fa;
      --border:#d9d9de;
      --shadow:0 4px 10px rgba(0,0,0,0.05);
      --shadow2:0 10px 24px rgba(0,0,0,0.12);
      --radius:18px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }

    .container {
      max-width: 430px;
      margin: auto;
      padding: 14px 14px calc(90px + env(safe-area-inset-bottom));
      min-height: 100dvh;
    }

    .stickyTop {
      position: sticky;
      top: 0;
      z-index: 20;
      background: linear-gradient(to bottom, rgba(242,242,247,.96), rgba(242,242,247,.88));
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      padding-bottom: 10px;
    }

    .title {
      font-size: 28px;
      font-weight: 700;
      margin: 0 0 12px;
      letter-spacing: -0.02em;
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-bottom: 14px;
    }

    .tabs button {
      min-height: 44px;
      border-radius: 14px;
      background: var(--soft);
      color: #000;
      border: none;
      font-size: 14px;
      font-weight: 600;
    }

    .tabs button.activeTab {
      background: #111;
      color: #fff;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 12px;
      box-shadow: var(--shadow);
      position: relative;
      transition: transform .18s ease, box-shadow .18s ease, opacity .18s ease;
    }

    .card:active {
      transform: scale(0.995);
    }

    .card.dragging {
      opacity: .7;
      transform: scale(1.02);
      box-shadow: var(--shadow2);
    }

    .done { background: #e8f8ee; }
    .special { background: #e6f0ff; }
    .extra { background: #e8f8ee; }

    button {
      min-height: 42px;
      padding: 8px 12px;
      border: none;
      border-radius: 12px;
      background: var(--blue);
      color: #fff;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: transform .15s ease, opacity .15s ease, background .15s ease;
    }

    button:active { transform: scale(0.98); }

    .small {
      min-height: 34px;
      font-size: 12px;
      padding: 6px 8px;
      border-radius: 10px;
    }

    .green { background: var(--green); }
    .red { background: var(--red); }
    .yellow { background: var(--yellow); color: #000; }
    .secondary { background: var(--soft); color: #000; }

    .bigBtn {
      width: 100%;
      min-height: 48px;
      font-size: 16px;
      border-radius: 14px;
    }

    .row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    input, select, textarea {
      width: 100%;
      min-height: 44px;
      border-radius: 12px;
      border: 1px solid #d1d1d6;
      font-size: 15px;
      padding: 10px 12px;
      font-family: inherit;
      background: #fff;
    }

    textarea {
      min-height: 100px;
      resize: vertical;
    }

    .helper {
      font-size: 12px;
      color: var(--muted);
    }

    .workoutColorDot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      flex: 0 0 14px;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.08);
    }

    .colorPreviewRow {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .colorPicker {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 10px;
    }

    .colorOption {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.08);
    }

    .colorOption.active {
      border-color: #111;
      transform: scale(1.08);
    }

    .exercise-img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      border-radius: 14px;
      margin-top: 10px;
      display: block;
    }

    .setRow {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-top: 6px;
      font-size: 14px;
    }

    .plus { color: var(--green); font-weight: 700; }
    .minus { color: var(--red); font-weight: 700; }

    .infoBtn {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      cursor: pointer;
      user-select: none;
      background: #d1d1d6;
      color: #000;
    }

    .yellowBg { background: var(--yellow); color: #000; }

    .toolbar {
      display: flex;
      gap: 6px;
      margin: 10px 0;
      flex-wrap: wrap;
    }

    .toolbar button,
    .toolbar select {
      background: var(--soft);
      color: #000;
      border: none;
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 13px;
      min-height: 38px;
      width: auto;
    }

    .editor {
      border: 1px solid #d1d1d6;
      border-radius: 14px;
      padding: 14px;
      min-height: 220px;
      background: #fff;
      font-size: 16px;
      line-height: 1.55;
      outline: none;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      transition: background .22s ease;
      z-index: 999;
      padding: 0;
    }

    .modal.show {
      background: rgba(0,0,0,.3);
    }

    .modalBox {
      width: 100%;
      max-width: 430px;
      max-height: 90dvh;
      overflow: auto;
      background: #fff;
      border-radius: 22px 22px 0 0;
      padding: 16px 16px calc(18px + env(safe-area-inset-bottom));
      transform: translateY(24px);
      opacity: 0;
      transition: transform .22s ease, opacity .22s ease;
      box-shadow: 0 -10px 30px rgba(0,0,0,.12);
    }

    .modal.show .modalBox {
      transform: translateY(0);
      opacity: 1;
    }

    .modalListItem {
      background: var(--soft2);
      border-radius: 14px;
      padding: 10px 12px;
      margin-top: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .calendarWrap {
      background: #fff;
      border-radius: 18px;
      padding: 12px;
      box-shadow: var(--shadow);
    }

    .calendarHeader {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .calendarTitle {
      font-size: 18px;
      font-weight: 700;
    }

    .calendarGrid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
    }

    .weekday {
      text-align: center;
      font-size: 12px;
      color: #666;
      padding: 4px 0 6px;
      font-weight: 700;
    }

    .dayCell {
      min-height: 64px;
      background: var(--soft2);
      border-radius: 14px;
      padding: 6px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      cursor: pointer;
      border: 1px solid transparent;
      transition: transform .14s ease, border-color .14s ease;
    }

    .dayCell:active { transform: scale(0.98); }
    .dayCell:hover { border-color: var(--border); }
    .dayCell.outsideMonth { opacity: .45; }
    .dayCell.today {
      background: #eef5ff;
      border-color: var(--blue);
      box-shadow: inset 0 0 0 1px var(--blue);
    }

    .dayNumber {
      font-size: 13px;
      font-weight: 700;
      text-align: right;
    }

    .dayDots {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      align-items: center;
      min-height: 10px;
    }

    .dayDot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.08);
    }

    /* Notes UI */
    .notesHeader {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 12px;
    }

    .notesSearch {
      width: 100%;
      margin-bottom: 10px;
    }

    .notesSegments,
    .folderWrap,
    .tagWrap {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .chip {
      border: none;
      background: #eef1f5;
      color: #333;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
      cursor: pointer;
      min-height: 38px;
    }

    .chip.active {
      background: #111;
      color: #fff;
    }

    .viewSwitch {
      display: flex;
      gap: 6px;
    }

    .viewSwitch button.active {
      background: #111;
      color: #fff;
    }

    .notesGrid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .notesList {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .noteCard {
      background: #fff;
      border-radius: 18px;
      padding: 14px;
      position: relative;
      box-shadow: var(--shadow);
      transition: transform .18s ease, box-shadow .18s ease;
      cursor: pointer;
      animation: noteFade .18s ease;
    }

    @keyframes noteFade {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .noteCard:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(0,0,0,.08);
    }

    .noteCardTitle {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 6px;
      padding-right: 120px;
      line-height: 1.3;
    }

    .noteCardPreview {
      font-size: 13px;
      color: #555;
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 5;
      -webkit-box-orient: vertical;
      overflow: hidden;
      min-height: 38px;
    }

    .noteCardMeta {
      font-size: 12px;
      color: #888;
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .noteCardActions {
      position: absolute;
      top: 12px;
      right: 12px;
      display: flex;
      gap: 6px;
    }

    .notePill {
      display: inline-block;
      background: #f0f1f5;
      color: #444;
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 999px;
    }

    .folderManageRow {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      background: var(--soft2);
      border-radius: 14px;
      padding: 10px 12px;
      margin-top: 8px;
    }

    .notesFab {
      position: fixed;
      right: 18px;
      bottom: calc(22px + env(safe-area-inset-bottom));
      width: 58px;
      height: 58px;
      border-radius: 50%;
      font-size: 28px;
      line-height: 1;
      box-shadow: 0 10px 24px rgba(0,122,255,.24);
      z-index: 40;
    }

    @media (min-width: 760px) {
      .notesGrid {
        grid-template-columns: 1fr 1fr;
      }
      .modal {
        align-items: center;
        padding: 16px;
      }
      .modalBox {
        max-width: 760px;
        border-radius: 22px;
        transform: translateY(18px);
      }
    }
  </style>
</head>
<body>
  <div class="container" id="app"></div>

  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyCGrNDdXDuUxlPhI0V2g7X7C679j2Vq7_8",
      authDomain: "workout-app-80e26.firebaseapp.com",
      projectId: "workout-app-80e26"
    });
    const db = firebase.firestore();

    let data = JSON.parse(localStorage.getItem('workouts')) || [];
    let calendarData = JSON.parse(localStorage.getItem('calendarData')) || {};
    let notesData = JSON.parse(localStorage.getItem('notesData')) || [];
    let notesFolders = JSON.parse(localStorage.getItem('notesFolders')) || [];
    let notesPrefs = JSON.parse(localStorage.getItem('notesPrefs')) || {
      view: 'grid',
      section: 'all',
      currentFolderId: 'all',
      currentTag: 'all'
    };

    let cw = null;
    let ce = null;
    let temp = [];
    let dragW = null;
    let dragE = null;
    let suppressNextSnapshot = false;
    let currentTab = 'notes';
    let calendarCursor = new Date();
    let notesSearch = '';
    let noteAutosaveTimer = null;

    const workoutColors = [
      '#007aff',
      '#34c759',
      '#ff3b30',
      '#ffcc00',
      '#af52de',
      '#ff9500',
      '#5ac8fa',
      '#8e8e93'
    ];

    function saveLocal() {
      localStorage.setItem('workouts', JSON.stringify(data));
      localStorage.setItem('calendarData', JSON.stringify(calendarData));
      localStorage.setItem('notesData', JSON.stringify(notesData));
      localStorage.setItem('notesFolders', JSON.stringify(notesFolders));
      localStorage.setItem('notesPrefs', JSON.stringify(notesPrefs));
    }

    function saveCloud() {
      suppressNextSnapshot = true;
      return db.collection("users").doc("main").set({
        workouts: data,
        calendarData: calendarData,
        notesData: notesData,
        notesFolders: notesFolders,
        notesPrefs: notesPrefs,
        updatedAt: Date.now()
      }).catch((err) => {
        suppressNextSnapshot = false;
        console.error("Firebase save error:", err);
      });
    }

    function save() {
      saveLocal();
      return saveCloud();
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text ?? '';
      return div.innerHTML;
    }

    function fmt(cmd, value = null) {
      document.execCommand(cmd, false, value);
    }

    function stripHtml(html) {
      const div = document.createElement('div');
      div.innerHTML = html || '';
      return div.textContent || div.innerText || '';
    }

    function formatDateTime(ts) {
      if (!ts) return '';
      return new Date(ts).toLocaleString('ru-RU', {
        day: '2-digit',
        month: '2-digit',
        year: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function normalizeTags(list) {
      if (!Array.isArray(list)) return [];
      return list.map(t => String(t).trim()).filter(Boolean);
    }

    function ensureWorkoutIds() {
      let changed = false;
      data.forEach(w => {
        if (!w.id) {
          w.id = 'w_' + Math.random().toString(36).slice(2) + Date.now().toString(36);
          changed = true;
        }
        if (!w.color) {
          w.color = '#8e8e93';
          changed = true;
        }
      });
      if (changed) save();
    }

    function ensureDefaultFolder() {
      if (!notesFolders.length) {
        notesFolders = [{ id: 'fld_default', name: 'Личное', createdAt: Date.now() }];
      }
    }

    function migrateNotesSystem() {
      ensureDefaultFolder();
      notesData = notesData.map(note => ({
        id: note.id || ('n_' + Math.random().toString(36).slice(2) + Date.now().toString(36)),
        title: note.title || '',
        content: note.content || '',
        pinned: !!note.pinned,
        favorite: !!note.favorite,
        folderId: note.folderId || notesFolders[0].id,
        tags: normalizeTags(note.tags || []),
        createdAt: note.createdAt || Date.now(),
        updatedAt: note.updatedAt || Date.now()
      }));
    }

    function folderNameById(folderId) {
      return notesFolders.find(f => f.id === folderId)?.name || 'Без папки';
    }

    function allTags() {
      const set = new Set();
      notesData.forEach(n => (n.tags || []).forEach(t => set.add(t)));
      return [...set].sort((a,b)=>a.localeCompare(b,'ru'));
    }

    db.collection("users").doc("main").onSnapshot(doc => {
      if (!doc.exists) return;

      if (suppressNextSnapshot) {
        suppressNextSnapshot = false;
        return;
      }

      const cloud = doc.data() || {};
      data = cloud.workouts || [];
      calendarData = cloud.calendarData || {};
      notesData = cloud.notesData || [];
      notesFolders = cloud.notesFolders || [];
      notesPrefs = cloud.notesPrefs || notesPrefs;

      ensureWorkoutIds();
      migrateNotesSystem();
      saveLocal();

      if (currentTab === 'calendar') {
        renderCalendar();
      } else if (currentTab === 'notes') {
        renderNotes();
      } else if (typeof cw === "number" && data[cw]) {
        openW(cw);
      } else {
        cw = null;
        home();
      }
    }, err => {
      console.error("Firebase sync error:", err);
    });

    function renderTabs() {
      return `
        <div class="stickyTop">
          <div class="tabs">
            <button class="${currentTab === 'notes' ? 'activeTab' : 'secondary'}" onclick="showNotes()">Заметки</button>
            <button class="${currentTab === 'workouts' ? 'activeTab' : 'secondary'}" onclick="showWorkouts()">Тренировки</button>
            <button class="${currentTab === 'calendar' ? 'activeTab' : 'secondary'}" onclick="showCalendar()">Календарь</button>
          </div>
        </div>
      `;
    }

    function showNotes() {
      currentTab = 'notes';
      renderNotes();
    }

    function showWorkouts() {
      currentTab = 'workouts';
      cw = null;
      home();
    }

    function showCalendar() {
      currentTab = 'calendar';
      renderCalendar();
    }

    function renderColorPicker(selected, index = null) {
      return `
        <div class="colorPicker">
          ${workoutColors.map(color => `
            <div
              class="colorOption ${selected === color ? 'active' : ''}"
              style="background:${color}"
              onclick="setWorkoutColor(${index}, '${color}')"
            ></div>
          `).join('')}
        </div>
      `;
    }

    /* ---------------- NOTES ---------------- */

    function setNotesView(view) {
      notesPrefs.view = view;
      save();
      renderNotes();
    }

    function setNotesSection(section) {
      notesPrefs.section = section;
      renderNotes();
    }

    function setNotesFolder(folderId) {
      notesPrefs.currentFolderId = folderId;
      renderNotes();
    }

    function setNotesTag(tag) {
      notesPrefs.currentTag = tag;
      renderNotes();
    }

    function setNotesSearch(value) {
      notesSearch = value || '';
      renderNotes();
    }

    function filteredNotes() {
      let items = [...notesData];

      if (notesPrefs.section === 'favorites') {
        items = items.filter(n => n.favorite);
      }

      if (notesPrefs.currentFolderId !== 'all') {
        items = items.filter(n => n.folderId === notesPrefs.currentFolderId);
      }

      if (notesPrefs.currentTag !== 'all') {
        items = items.filter(n => (n.tags || []).includes(notesPrefs.currentTag));
      }

      if (notesSearch.trim()) {
        const q = notesSearch.trim().toLowerCase();
        items = items.filter(n => {
          const hay = `${n.title} ${stripHtml(n.content)} ${(n.tags || []).join(' ')} ${folderNameById(n.folderId)}`.toLowerCase();
          return hay.includes(q);
        });
      }

      items.sort((a, b) => {
        if (!!b.pinned !== !!a.pinned) return Number(b.pinned) - Number(a.pinned);
        return (b.updatedAt || 0) - (a.updatedAt || 0);
      });

      return items;
    }

    function renderNotes() {
      currentTab = 'notes';
      migrateNotesSystem();

      const tags = allTags();
      const items = filteredNotes();
      const app = document.getElementById('app');

      app.innerHTML = `
        ${renderTabs()}

        <div class="notesHeader">
          <h1 class="title">Заметки</h1>
          <div class="viewSwitch">
            <button class="${notesPrefs.view === 'grid' ? 'active' : 'secondary'}" onclick="setNotesView('grid')">▥</button>
            <button class="${notesPrefs.view === 'list' ? 'active' : 'secondary'}" onclick="setNotesView('list')">☰</button>
          </div>
        </div>

        <input class="notesSearch" placeholder="Поиск по заметкам" value="${escapeHtml(notesSearch)}" oninput="setNotesSearch(this.value)">

        <div class="notesSegments">
          <button class="chip ${notesPrefs.section === 'all' ? 'active' : ''}" onclick="setNotesSection('all')">Все заметки</button>
          <button class="chip ${notesPrefs.section === 'folders' ? 'active' : ''}" onclick="setNotesSection('folders')">Папки</button>
          <button class="chip ${notesPrefs.section === 'favorites' ? 'active' : ''}" onclick="setNotesSection('favorites')">Избранное</button>
          <button class="chip ${notesPrefs.section === 'tags' ? 'active' : ''}" onclick="setNotesSection('tags')">Теги</button>
        </div>

        <div class="folderWrap">
          <button class="chip ${notesPrefs.currentFolderId === 'all' ? 'active' : ''}" onclick="setNotesFolder('all')">Все папки</button>
          ${notesFolders.map(f => `
            <button class="chip ${notesPrefs.currentFolderId === f.id ? 'active' : ''}" onclick="setNotesFolder('${f.id}')">${escapeHtml(f.name)}</button>
          `).join('')}
        </div>

        <div class="tagWrap">
          <button class="chip ${notesPrefs.currentTag === 'all' ? 'active' : ''}" onclick="setNotesTag('all')">Все теги</button>
          ${tags.map(tag => `
            <button class="chip ${notesPrefs.currentTag === tag ? 'active' : ''}" onclick="setNotesTag('${escapeHtml(tag)}')">#${escapeHtml(tag)}</button>
          `).join('')}
        </div>

        ${notesPrefs.section === 'folders' ? `
          <div class="card">
            <div class="row">
              <input id="newFolderName" placeholder="Новая папка" style="flex:1">
              <button onclick="createFolder()">Создать</button>
            </div>
            ${notesFolders.map(f => `
              <div class="folderManageRow">
                <span>${escapeHtml(f.name)}</span>
                <div class="row" style="margin-top:0">
                  <button class="small" onclick="renameFolder('${f.id}')">✏️</button>

    function createFolder() {
      const input = document.getElementById('newFolderName');
      const name = input?.value?.trim();
      if (!name) return;

      notesFolders.push({
        id: 'fld_' + Math.random().toString(36).slice(2) + Date.now().toString(36),
        name,
        createdAt: Date.now()
      });

      input.value = '';
      save();
      renderNotes();
    }

    function renameFolder(folderId) {
      const folder = notesFolders.find(f => f.id === folderId);
      if (!folder) return;
      const name = prompt('Название папки', folder.name);
      if (!name || !name.trim()) return;
      folder.name = name.trim();
      save();
      renderNotes();
    }

    function deleteFolder(folderId) {
      const folder = notesFolders.find(f => f.id === folderId);
      if (!folder) return;

      const fallback = notesFolders.find(f => f.id !== folderId);
      if (!fallback) {
        alert('Должна остаться хотя бы одна папка.');
        return;
      }

      if (!confirm(`Удалить папку "${folder.name}"? Заметки будут перенесены в "${fallback.name}".`)) return;

      notesData.forEach(n => {
        if (n.folderId === folderId) n.folderId = fallback.id;
      });

      notesFolders = notesFolders.filter(f => f.id !== folderId);

      if (notesPrefs.currentFolderId === folderId) {
        notesPrefs.currentFolderId = 'all';
      }

      save();
      renderNotes();
    }

      const editor = document.getElementById('noteContentEditor');
      if (!editor) return;
      editor.focus();
      document.execCommand('insertHTML', false, '<div>☐ Новый пункт</div>');
    }

    function insertBulletList() {
      const editor = document.getElementById('noteContentEditor');
      if (!editor) return;
      editor.focus();
      document.execCommand('insertUnorderedList', false, null);
    }

    function insertHeading() {
      const editor = document.getElementById('noteContentEditor');
      if (!editor) return;
      editor.focus();

    function saveNoteFromModal(noteId, silent = false) {
      const title = document.getElementById('noteTitleInput')?.value?.trim() || '';
      const folderId = document.getElementById('noteFolderSelect')?.value || (notesFolders[0]?.id || 'fld_default');
      const tags = normalizeTags((document.getElementById('noteTagsInput')?.value || '').split(','));
      const content = document.getElementById('noteContentEditor')?.innerHTML || '';

      const existing = notesData.find(n => n.id === noteId);

      if (existing) {
        existing.title = title || 'Без названия';
        existing.folderId = folderId;
        existing.tags = tags;
        existing.content = content;
        existing.updatedAt = Date.now();
      } else {
        notesData.push({
          id: noteId,
          title: title || 'Без названия',
          folderId,
          tags,
          content,
          pinned: false,
          favorite: false,
          createdAt: Date.now(),
          updatedAt: Date.now()
        });
      }

      save();

      if (!silent) {
        closeTopModal();
        renderNotes();
      }
    }

    function togglePinNoteFromEditor(noteId) {
      const existing = notesData.find(n => n.id === noteId);
      if (existing) {
        existing.pinned = !existing.pinned;
        existing.updatedAt = Date.now();
      } else {
        saveNoteFromModal(noteId, true);
        const note = notesData.find(n => n.id === noteId);
        if (note) note.pinned = true;
      }
      save();
      openNoteEditor(noteId);
    }

    function toggleFavoriteNoteFromEditor(noteId) {
      const existing = notesData.find(n => n.id === noteId);
      if (existing) {
        existing.favorite = !existing.favorite;
        existing.updatedAt = Date.now();
      } else {
        saveNoteFromModal(noteId, true);
        const note = notesData.find(n => n.id === noteId);
        if (note) note.favorite = true;
      }
      save();
      openNoteEditor(noteId);
    }

    function togglePinNote(noteId) {
      const note = notesData.find(n => n.id === noteId);
      if (!note) return;
      note.pinned = !note.pinned;
      note.updatedAt = Date.now();
      save();
      renderNotes();
    }

    function toggleFavoriteNote(noteId) {
      const note = notesData.find(n => n.id === noteId);
      if (!note) return;
      note.favorite = !note.favorite;
      note.updatedAt = Date.now();
      save();
      renderNotes();

    /* ---------------- CALENDAR ---------------- */

    function formatDayKey(y, m, d) {
      const safeDate = new Date(y, m, d);
      const yy = safeDate.getFullYear();
      const mm = String(safeDate.getMonth() + 1).padStart(2, '0');
      const dd = String(safeDate.getDate()).padStart(2, '0');
      return `${yy}-${mm}-${dd}`;
    }

    function monthTitle(date) {
      const months = [
        'Январь', 'Февраль', 'Март', 'Апрель', 'Май', 'Июнь',
        'Июль', 'Август', 'Сентябрь', 'Октябрь', 'Ноябрь', 'Декабрь'
      ];
      return `${months[date.getMonth()]} ${date.getFullYear()}`;
    }

    function changeMonth(delta) {
      calendarCursor = new Date(calendarCursor.getFullYear(), calendarCursor.getMonth() + delta, 1);
      renderCalendar();
    }

    function buildDayDots(entries) {
      return entries.map(entry => {
        const workout = data.find(w => w.id === entry.workoutId);
        if (!workout) return '';
        return `<div class="dayDot" style="background:${workout.color || '#8e8e93'}"></div>`;
      }).join('');
    }

    function renderCalendar() {
      currentTab = 'calendar';
      const app = document.getElementById('app');

      const year = calendarCursor.getFullYear();
      const month = calendarCursor.getMonth();
      const first = new Date(year, month, 1);
      const last = new Date(year, month + 1, 0);

      let firstWeekDay = first.getDay();
      if (firstWeekDay === 0) firstWeekDay = 7;
      const leadingDays = firstWeekDay - 1;

      const daysInMonth = last.getDate();
      const prevMonthLast = new Date(year, month, 0).getDate();

      const today = new Date();
      const todayKey = formatDayKey(today.getFullYear(), today.getMonth(), today.getDate());

      const weekLabels = ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Вс'];
      const weekHeader = weekLabels.map(d => `<div class="weekday">${d}</div>`).join('');

      let cells = '';

      for (let i = leadingDays - 1; i >= 0; i--) {
        const day = prevMonthLast - i;
        const prevKey = formatDayKey(year, month - 1, day);
        const prevDots = buildDayDots(calendarData[prevKey] || []);
        cells += `
          <div class="dayCell outsideMonth" onclick="openDay('${prevKey}')">
            <div class="dayNumber">${day}</div>
            <div class="dayDots">${prevDots}</div>
          </div>
        `;
      }

      for (let day = 1; day <= daysInMonth; day++) {
        const key = formatDayKey(year, month, day);
        const dots = buildDayDots(calendarData[key] || []);
        const todayClass = key === todayKey ? ' today' : '';
        cells += `
          <div class="dayCell${todayClass}" onclick="openDay('${key}')">
            <div class="dayNumber">${day}</div>
            <div class="dayDots">${dots}</div>
          </div>
        `;
      }

      const used = leadingDays + daysInMonth;
      const trailing = used % 7 === 0 ? 0 : 7 - (used % 7);

      for (let day = 1; day <= trailing; day++) {
        const nextKey = formatDayKey(year, month + 1, day);
        const nextDots = buildDayDots(calendarData[nextKey] || []);
        cells += `
          <div class="dayCell outsideMonth" onclick="openDay('${nextKey}')">
            <div class="dayNumber">${day}</div>
            <div class="dayDots">${nextDots}</div>
          </div>
        `;
      }

      app.innerHTML = `
        ${renderTabs()}
        <h1 class="title">Календарь</h1>

        <div class="calendarWrap">
          <div class="calendarHeader">
            <button class="secondary" onclick="changeMonth(-1)">←</button>
            <div class="calendarTitle">${monthTitle(calendarCursor)}</div>
            <button class="secondary" onclick="changeMonth(1)">→</button>
          </div>

          <div class="calendarGrid">
            ${weekHeader}
            ${cells}
          </div>
        </div>
      `;
    }

    function renderDayModal(key) {
      const entries = calendarData[key] || [];

      const existingHtml = entries.length
        ? entries.map((entry, idx) => {
            const workout = data.find(w => w.id === entry.workoutId);
            if (!workout) return '';
            return `
              <div class="modalListItem">
                <div style="display:flex;align-items:center;gap:8px">
                  <div class="workoutColorDot" style="background:${workout.color || '#8e8e93'}"></div>
                  <span>${escapeHtml(workout.name)}</span>
                </div>
                <button class="red" onclick="removeWorkoutFromDay('${key}', ${idx})">🗑</button>
              </div>
            `;
          }).join('')
        : `<div class="helper">На этот день пока ничего не добавлено.</div>`;

      const options = data.length
        ? data.map((w, i) => `
            <div class="modalListItem">
              <div style="display:flex;align-items:center;gap:8px">
                <div class="workoutColorDot" style="background:${w.color || '#8e8e93'}"></div>
                <span>${escapeHtml(w.name)}</span>
              </div>
              <button onclick="addWorkoutToDay('${key}', ${i})">Добавить</button>
            </div>
          `).join('')
        : `<div class="helper">Сначала добавь тренировки.</div>`;

      openCustomModal(`
        <div class="title" style="font-size:20px;margin-bottom:8px">День ${key}</div>
        <div class="helper">Добавленные тренировки</div>
        ${existingHtml}
        <div class="helper" style="margin-top:12px">Выбрать тренировку</div>
        ${options}
      `);
    }

    function openDay(key) {
      renderDayModal(key);
    }

    function addWorkoutToDay(key, workoutIndex) {
      const workout = data[workoutIndex];
      if (!workout) return;

      ensureWorkoutIds();

      if (!calendarData[key]) calendarData[key] = [];
      calendarData[key].push({
        workoutId: workout.id,
        addedAt: Date.now()
      });

      save();
      renderDayModal(key);
      renderCalendar();
    }

    function removeWorkoutFromDay(key, entryIndex) {
      if (!calendarData[key]) return;
      calendarData[key].splice(entryIndex, 1);

      if (calendarData[key].length === 0) {
        delete calendarData[key];
      }

      save();
      renderDayModal(key);
      renderCalendar();
    }

    /* ---------------- MODALS / IMPORT / EXPORT ---------------- */

    function openModal(title, render, add) {
      const modal = document.createElement('div');
      modal.className = 'modal';

      modal.innerHTML = `
        <div class="modalBox">
          <b>${escapeHtml(title)}</b>
          <div id="list"></div>

          <div class="row">
            <input id="w" placeholder="Вес" style="flex:1" />
            <input id="r" placeholder="Повторы" style="flex:1" />
            <button id="addBtn">+</button>
          </div>

          <div class="row">
            <button class="secondary" onclick="closeModal(this)">Закрыть</button>
          </div>
        </div>
      `;

      document.body.appendChild(modal);

      requestAnimationFrame(() => {
        modal.classList.add('show');
      });

      modal.querySelector('#addBtn').onclick = add;
      render();
    }

    function openCustomModal(html) {
      let modal = document.querySelector('.modal');
      if (!modal) {
        modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `<div class="modalBox"></div>`;
        document.body.appendChild(modal);
        requestAnimationFrame(() => {
          modal.classList.add('show');
        });
      }

      const box = modal.querySelector('.modalBox');
      box.innerHTML = `
        ${html}
        <div class="row">
          <button class="secondary" onclick="closeModal(this)">Закрыть</button>
        </div>
      `;
    }

    function closeModal(btn) {
      const modal = btn.closest('.modal');
      if (!modal) return;
      modal.classList.remove('show');
      setTimeout(() => modal.remove(), 180);
    }

    function closeTopModal() {
      const modal = document.querySelector('.modal');
      if (!modal) return;
      modal.classList.remove('show');
      setTimeout(() => modal.remove(), 180);
    }

    function exportData() {
      const payload = {
        workouts: data,
        calendarData: calendarData,
        notesData: notesData,
        notesFolders: notesFolders,
        notesPrefs: notesPrefs
      };
      const blob = new Blob([JSON.stringify(payload)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);

      const a = document.createElement('a');
      a.href = url;
      a.download = 'workouts.json';
      a.click();

      URL.revokeObjectURL(url);
    }

    function importData() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'application/json';

      input.onchange = function (e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function (event) {
          try {
            const parsed = JSON.parse(event.target.result);

            if (Array.isArray(parsed)) {
              data = parsed;
              calendarData = {};
              notesData = [];
              notesFolders = [];
            } else {
              data = parsed.workouts || [];
              calendarData = parsed.calendarData || {};
              notesData = parsed.notesData || [];
              notesFolders = parsed.notesFolders || [];
              notesPrefs = parsed.notesPrefs || notesPrefs;
            }

            ensureWorkoutIds();
            migrateNotesSystem();
            save();
            renderNotes();
          } catch (err) {
            alert('Ошибка файла');
          }
        };

        reader.readAsText(file);
      };

      input.click();
    }

    ensureWorkoutIds();
    migrateNotesSystem();
    renderNotes();
  </script>
</body>
</html>
