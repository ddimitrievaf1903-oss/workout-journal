<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Журнал тренировок</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body{font-family:-apple-system;background:#f2f2f7;margin:0}
.container{max-width:420px;margin:auto;padding:16px}
.card{background:#fff;border-radius:16px;padding:12px;margin-bottom:12px;position:relative}
.done{background:#e8f8ee}
.special{background:#e6f0ff}
.extra{background:#e8f8ee}

button{padding:6px 8px;border:none;border-radius:8px;background:#007aff;color:#fff}
.green{background:#34c759}
.red{background:#ff3b30}
.yellow{background:#ffcc00;color:#000}
.gray{background:#ccc;color:#000}

.row{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}

.exercise-img{width:100%;height:150px;object-fit:cover;border-radius:12px;margin-top:8px}

.modal{position:fixed;inset:0;background:rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center}
.modalBox{background:#fff;padding:16px;border-radius:16px;width:90%}

.setRow{display:flex;justify-content:space-between}

.infoBtn{
position:absolute;
right:8px;
top:8px;
width:24px;height:24px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

input{padding:8px;border-radius:8px;border:1px solid #ccc;width:100%}
</style>
</head>

<body>
<div class="container" id="app"></div>

<script>

// ===== FIREBASE =====
firebase.initializeApp({
  apiKey: "AIzaSyCGrNDdXDuUxlPhI0V2g7X7C679j2Vq7_8",
  authDomain: "workout-app-80e26.firebaseapp.com",
  projectId: "workout-app-80e26"
});
const db = firebase.firestore();

// ===== DATA =====
let data = JSON.parse(localStorage.getItem('workouts')) || [];

let cw = null;
let ce = null;
let temp = [];

let dragIndex = null;
let touchIndex = null;

// ===== SAVE =====
function save(){
  localStorage.setItem('workouts', JSON.stringify(data));
  db.collection("users").doc("main").set({workouts:data});
}

// ===== SYNC =====
db.collection("users").doc("main").onSnapshot(doc=>{
  if(!doc.exists)return;
  let cloud = doc.data().workouts || [];
  if(JSON.stringify(cloud)!==JSON.stringify(data)){
    data = cloud;
    home();
  }
});

// ===== DRAG =====
function attachDrag(el,index,arr,render){

  // ПК
  el.draggable = true;

  el.ondragstart = ()=>dragIndex=index;

  el.ondragover = e=>e.preventDefault();

  el.ondrop = ()=>{
    if(dragIndex===index)return;
    let moved = arr.splice(dragIndex,1)[0];
    arr.splice(index,0,moved);
    save();
    render();
  };

  // 📱 ТЕЛЕФОН
  el.ontouchstart = ()=>touchIndex=index;

  el.ontouchmove = e=>{
    let t = e.touches[0];
    let elOver = document.elementFromPoint(t.clientX,t.clientY)?.closest('.card');
    if(!elOver)return;

    let list = [...el.parentNode.children];
    let overIndex = list.indexOf(elOver);

    if(overIndex!==touchIndex && overIndex!==-1){
      let moved = arr.splice(touchIndex,1)[0];
      arr.splice(overIndex,0,moved);
      touchIndex = overIndex;
      localStorage.setItem('workouts', JSON.stringify(data));
      render();
    }
  };

  el.ontouchend = ()=>{
    touchIndex=null;
    save();
  };
}

// ===== HOME =====
function home(){
  app.innerHTML=`
  <h2>Тренировки</h2>
  <div id="list"></div>

  <input id="nw" placeholder="Новая тренировка">
  <button onclick="addW()">Добавить</button>
  `;

  let list=document.getElementById('list');

  data.forEach((w,i)=>{
    let d=document.createElement('div');
    d.className='card '+(w.done?'done':'');

    attachDrag(d,i,data,home);

    d.innerHTML=`
    <b>${w.name}</b>

    <div class="row">
      <button onclick="openW(${i})">Открыть</button>
      <button class="green" onclick="done(${i})">✔</button>
      <button class="red" onclick="undone(${i})">✖</button>
    </div>
    `;

    list.appendChild(d);
  });
}

// ===== WORKOUT =====
function openW(i){
  cw=i;
  let w=data[i];

  app.innerHTML=`
  <button onclick="home()">← Назад</button>
  <h2>${w.name}</h2>
  <div id="list"></div>

  <button onclick="addE()">Добавить</button>
  <button onclick="addE('special')">Особое</button>
  <button onclick="addE('extra')">Доп</button>
  `;

  let list=document.getElementById('list');

  w.exercises.forEach((e,ei)=>{
    let d=document.createElement('div');

    d.className='card '+
    (e.special?'special':'')+
    (e.extra?'extra':'');

    attachDrag(d,ei,w.exercises,()=>openW(cw));

    let setsHTML='';
    let max=Math.max(e.sets?.length||0,e.newSets?.length||0);

    for(let j=0;j<max;j++){
      let l=e.sets?.[j]||'';
      let r=e.newSets?.[j]||'';

      setsHTML+=`
      <div class="setRow">
        <span>${l}</span>
        <span>${r}</span>
      </div>`;
    }

    d.innerHTML=`
    <b>${e.name}</b>

    <div class="infoBtn ${e.info?'yellow':'gray'}" onclick="openInfo(${ei})">!</div>

    ${e.img?`<img src="${e.img}" class="exercise-img">`:''}

    ${setsHTML}

    <div class="row">
      <button onclick="openSets(${ei})">Подходы</button>
      <button class="yellow" onclick="newRes(${ei})">Новый результат</button>
      ${e.newSets?.length?`<button class="green" onclick="saveRes(${ei})">Сохранить</button>`:''}
    </div>
    `;

    list.appendChild(d);
  });
}

// ===== BASIC =====
function addW(){
  let v=nw.value;
  if(!v)return;
  data.push({name:v,exercises:[]});
  save(); home();
}

function done(i){data[i].done=true;save();home();}
function undone(i){delete data[i].done;save();home();}

function addE(type){
  data[cw].exercises.push({
    name:'Упражнение',
    sets:[],
    special:type==='special',
    extra:type==='extra'
  });
  save(); openW(cw);
}

// ===== MODAL =====
function modal(content){
  let m=document.createElement('div');
  m.className='modal';
  m.innerHTML=`<div class="modalBox">${content}<br><button onclick="this.closest('.modal').remove()">Закрыть</button></div>`;
  document.body.appendChild(m);
}

// ===== INFO =====
function openInfo(i){
  modal(`<div contenteditable="true" id="info">${data[cw].exercises[i].info||''}</div>
  <button onclick="saveInfo(${i})">Сохранить</button>`);
}

function saveInfo(i){
  data[cw].exercises[i].info=document.getElementById('info').innerHTML;
  save();
}

// ===== SETS / NEW =====
function openSets(i){ modal("Подходы"); }
function newRes(i){ modal("Новый результат"); }

// ===== SAVE RESULT =====
function saveRes(i){
  let e=data[cw].exercises[i];
  e.sets=e.newSets;
  delete e.newSets;
  save(); openW(cw);
}

// ===== START =====
home();

</script>
</body>
</html>
