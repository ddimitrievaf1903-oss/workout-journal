<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body{font-family:-apple-system;background:#f2f2f7;margin:0}
.container{max-width:420px;margin:auto;padding:16px}

.card{
background:#fff;
border-radius:16px;
padding:12px;
margin-bottom:12px;
position:relative;
}

.done{background:#e8f8ee}

.row{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}

/* МЕНЮ КНОПКИ */
.controls{
position:absolute;
right:8px;
top:8px;
display:flex;
gap:4px;
}

.controls button{
padding:3px 5px;
font-size:12px;
}

/* ЦВЕТА */
.green{background:#34c759}
.red{background:#ff3b30}
.yellow{background:#ffcc00;color:#000}
.gray{background:#ccc;color:#000}

input{
padding:8px;
border-radius:8px;
border:1px solid #ccc;
width:100%;
}

/* MODAL */
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.3);
display:flex;
align-items:center;
justify-content:center;
}

.modalBox{
background:#fff;
padding:16px;
border-radius:16px;
width:90%;
max-width:360px;
}

/* SETS */
.setRow{
display:flex;
justify-content:space-between;
margin-top:4px;
}

.exercise-img{
width:100%;
height:150px;
object-fit:cover;
border-radius:12px;
margin-top:8px;
}

.infoBtn{
position:absolute;
left:8px;
top:8px;
width:24px;height:24px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

.up{color:#34c759}
.down{color:#ff3b30}
</style>
</head>

<body>
<div class="container" id="app"></div>

<script>

// FIREBASE
firebase.initializeApp({
apiKey:"AIzaSyCGrNDdXDuUxlPhI0V2g7X7C679j2Vq7_8",
authDomain:"workout-app-80e26.firebaseapp.com",
projectId:"workout-app-80e26"
});
const db=firebase.firestore();

// DATA
let data=JSON.parse(localStorage.getItem('workouts'))||[];

// SAVE
function save(){
localStorage.setItem('workouts',JSON.stringify(data));
db.collection("users").doc("main").set({workouts:data});
}

// SYNC
db.collection("users").doc("main").onSnapshot(doc=>{
if(!doc.exists)return;
let cloud=doc.data().workouts||[];
if(JSON.stringify(cloud)!==JSON.stringify(data)){
data=cloud;
home();
}
});

// ===== HOME =====
function home(){
app.innerHTML=`
<h2>Тренировки</h2>
<div id="list"></div>

<input id="nw">
<button onclick="addW()">+</button>
`;

let list=document.getElementById('list');

data.forEach((w,i)=>{

let d=document.createElement('div');
d.className='card '+(w.done?'done':'');
d.draggable=true;

d.ondragstart=e=>e.dataTransfer.setData("i",i);
d.ondrop=e=>{
let from=e.dataTransfer.getData("i");
let m=data.splice(from,1)[0];
data.splice(i,0,m);
save();home();
};
d.ondragover=e=>e.preventDefault();

d.innerHTML=`
<b>${w.name}</b>

<div class="controls">
<button class="green" onclick="done(${i})">✔</button>
<button class="red" onclick="undone(${i})">✖</button>
<button onclick="editW(${i})">✏️</button>
<button class="red" onclick="delW(${i})">🗑</button>
</div>

<div class="row">
<button onclick="openW(${i})">Открыть</button>
</div>
`;

list.appendChild(d);
});
}

// ===== WORKOUT =====
function openW(wi){
let w=data[wi];

app.innerHTML=`
<button onclick="home()">←</button>
<h2>${w.name}</h2>
<div id="list"></div>

<button onclick="addE(${wi})">Добавить</button>
<button onclick="addE(${wi},'special')">Особое</button>
<button onclick="addE(${wi},'extra')">Доп</button>
`;

let list=document.getElementById('list');

w.exercises.forEach((e,ei)=>{

let bg=e.special?'background:#d0e7ff':e.extra?'background:#d4f8d4':'';

let setsHTML='';
let max=Math.max(e.sets?.length||0,e.newSets?.length||0);

for(let i=0;i<max;i++){
let oldS=e.sets?.[i]||'';
let newS=e.newSets?.[i]||'';

let diff='';
if(oldS&&newS){
let ow=parseFloat(oldS);
let nw=parseFloat(newS);
if(nw>ow) diff='<span class="up">↑</span>';
if(nw<ow) diff='<span class="down">↓</span>';
}

setsHTML+=`
<div class="setRow">
<span>${oldS?`Подход ${i+1}: ${oldS}`:''}</span>
<span>${newS||''} ${diff}</span>
</div>`;
}

let d=document.createElement('div');
d.className='card';
d.style=bg;

d.innerHTML=`

<div class="infoBtn ${e.info?'yellow':'gray'}" onclick="openInfo(${wi},${ei})">!</div>

<b>${e.name}</b>

<div class="controls">
<button onclick="editE(${wi},${ei})">✏️</button>
<button class="red" onclick="delE(${wi},${ei})">🗑</button>
</div>

${e.img?`<img src="${e.img}" class="exercise-img">`:''}

${setsHTML}

<div class="row">
<button onclick="openSets(${wi},${ei})">Подходы</button>
<button class="yellow" onclick="openNew(${wi},${ei})">Новый результат</button>
${e.newSets?.length?`<button class="green" onclick="saveRes(${wi},${ei})">Сохранить</button>`:''}
</div>
`;

list.appendChild(d);
});
}

// ===== INFO MODAL =====
function openInfo(wi,ei){
let e=data[wi].exercises[ei];

modal(`
<h3>Информация</h3>
<div contenteditable="true" id="info">${e.info||''}</div>
<button onclick="saveInfo(${wi},${ei})">Сохранить</button>
`);
}

function saveInfo(wi,ei){
data[wi].exercises[ei].info=document.getElementById('info').innerHTML;
save();
}

// ===== ВСЁ ОСТАЛЬНОЕ =====
function addW(){let v=nw.value;if(!v)return;data.push({name:v,exercises:[]});save();home();}
function editW(i){let n=prompt('Название',data[i].name);if(n){data[i].name=n;save();home();}}
function delW(i){if(confirm('Удалить?')){data.splice(i,1);save();home();}}
function done(i){data[i].done=true;save();home();}
function undone(i){delete data[i].done;save();home();}

function addE(wi,type){
data[wi].exercises.push({name:'Упражнение',sets:[],special:type==='special',extra:type==='extra'});
save();openW(wi);
}

function editE(wi,ei){
let e=data[wi].exercises[ei];
let n=prompt('Название',e.name);
let img=prompt('Фото',e.img||'');
if(n){e.name=n;e.img=img||'';save();openW(wi);}
}

function delE(wi,ei){
if(confirm('Удалить?')){
data[wi].exercises.splice(ei,1);
save();openW(wi);
}
}

// ===== MODAL =====
function modal(content){
let m=document.createElement('div');
m.className='modal';
m.innerHTML=`<div class="modalBox">${content}<br><button onclick="this.closest('.modal').remove()">Закрыть</button></div>`;
document.body.appendChild(m);
}

// ===== SETS =====
function openSets(wi,ei){
modal(`<h3>Подходы</h3>`);
}

// ===== NEW =====
function openNew(wi,ei){
modal(`<h3>Новый результат</h3>`);
}

// ===== START =====
home();

</script>
</body>
</html>
