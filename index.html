<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout Pro</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body{font-family:-apple-system;background:#f2f2f7;margin:0}
.container{max-width:420px;margin:auto;padding:16px}
.card{background:#fff;border-radius:16px;padding:12px;margin-bottom:12px;cursor:grab}
.exercise-img{width:100%;height:150px;object-fit:cover;border-radius:12px}
button{padding:6px 8px;border:none;border-radius:8px;background:#007aff;color:#fff}
.green{background:#34c759}
.yellow{background:#ffcc00;color:#000}
.red{background:#ff3b30}
.row{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.set{display:flex;justify-content:space-between}
.up{color:#34c759}
.down{color:#ff3b30}
</style>
</head>

<body>
<div class="container" id="app"></div>

<script>

// ===== FIREBASE =====
firebase.initializeApp({
apiKey:"AIzaSy...",
authDomain:"workout-app-80e26.firebaseapp.com",
projectId:"workout-app-80e26"
});
const db = firebase.firestore();

// ===== DATA =====
let data = JSON.parse(localStorage.getItem('workouts')) || [];
let dragW=null, dragE=null;

// ===== SAVE =====
function save(){
localStorage.setItem('workouts', JSON.stringify(data));
db.collection("users").doc("main").set({workouts:data});
}

// ===== SYNC =====
db.collection("users").doc("main")
.onSnapshot(doc=>{
if(!doc.exists)return;
let cloud = doc.data().workouts || [];

if(JSON.stringify(cloud)!==JSON.stringify(data)){
data=cloud;
localStorage.setItem('workouts', JSON.stringify(data));
home();
}
});

// ===== HOME =====
function home(){
let html=`<h2>Тренировки</h2><div id="list"></div>
<input id="nw"><button onclick="addW()">+</button>`;

app.innerHTML=html;
let list=document.getElementById('list');

data.forEach((w,i)=>{
let d=document.createElement('div');
d.className='card';
d.draggable=true;

d.ondragstart=()=>dragW=i;
d.ondragover=e=>e.preventDefault();
d.ondrop=()=>{
if(dragW===i)return;
let m=data.splice(dragW,1)[0];
data.splice(i,0,m);
save(); home();
};

d.innerHTML=`<b>${w.name}</b>
<div class="row">
<button onclick="openW(${i})">Открыть</button>
<button class="red" onclick="delW(${i})">Удалить</button>
</div>`;

list.appendChild(d);
});
}

// ===== ADD WORKOUT =====
function addW(){
let v=document.getElementById('nw').value;
if(!v)return;
data.push({name:v,exercises:[]});
save(); home();
}

// ===== DELETE WORKOUT =====
function delW(i){
if(!confirm('Удалить тренировку?'))return;
data.splice(i,1);
save(); home();
}

// ===== OPEN WORKOUT =====
function openW(wi){
let w=data[wi];

app.innerHTML=`<button onclick="home()">←</button>
<h2>${w.name}</h2>
<div id="list"></div>

<button onclick="addE(${wi},'normal')">Добавить</button>
<button onclick="addE(${wi},'special')">Особое</button>
<button onclick="addE(${wi},'extra')">Доп</button>`;

let list=document.getElementById('list');

w.exercises.forEach((e,ei)=>{

let d=document.createElement('div');
d.className='card';
d.draggable=true;

d.ondragstart=()=>dragE=ei;
d.ondragover=e=>e.preventDefault();
d.ondrop=()=>{
if(dragE===ei)return;
let m=w.exercises.splice(dragE,1)[0];
w.exercises.splice(ei,0,m);
save(); openW(wi);
};

let setsHTML='';
(e.sets||[]).forEach((s,i)=>{
let newS=e.newSets?.[i];
let diff='';
if(newS){
let oldW=parseInt(s);
let newW=parseInt(newS);
if(newW>oldW) diff='<span class="up">↑</span>';
if(newW<oldW) diff='<span class="down">↓</span>';
}
setsHTML+=`<div class="set">${s} ${newS||''} ${diff}</div>`;
});

d.innerHTML=`
<b>${e.name}</b>
<button onclick="editE(${wi},${ei})">✏️</button>
<button class="red" onclick="delE(${wi},${ei})">🗑</button>

${e.img?`<img src="${e.img}" class="exercise-img">`:''}

${setsHTML}

<div class="row">
<button onclick="addSet(${wi},${ei})">Подходы</button>
<button class="yellow" onclick="newRes(${wi},${ei})">Новый</button>
${e.newSets?`<button class="green" onclick="saveRes(${wi},${ei})">Сохранить</button>`:''}
</div>
`;

list.appendChild(d);
});
}

// ===== ADD EXERCISE =====
function addE(wi,type){
data[wi].exercises.push({
name:'Упражнение',
img:'',
sets:[],
special:type=='special',
extra:type=='extra'
});
save(); openW(wi);
}

// ===== EDIT EXERCISE =====
function editE(wi,ei){
let e=data[wi].exercises[ei];
let n=prompt('Название',e.name);
let img=prompt('Фото',e.img);
if(!n)return;

e.name=n;
e.img=img||'';
save(); openW(wi);
}

// ===== DELETE EXERCISE =====
function delE(wi,ei){
if(!confirm('Удалить упражнение?'))return;
data[wi].exercises.splice(ei,1);
save(); openW(wi);
}

// ===== SET =====
function addSet(wi,ei){
let w=prompt('Вес');
let r=prompt('Повторы');
if(!w||!r)return;
data[wi].exercises[ei].sets.push(w+'x'+r);
save(); openW(wi);
}

// ===== NEW RESULT =====
function newRes(wi,ei){
let w=prompt('Вес');
let r=prompt('Повторы');
if(!w||!r)return;

let ex=data[wi].exercises[ei];
if(!ex.newSets) ex.newSets=[];
ex.newSets.push(w+'x'+r);

save(); openW(wi);
}

// ===== SAVE RESULT =====
function saveRes(wi,ei){
let ex=data[wi].exercises[ei];
ex.sets=ex.newSets;
delete ex.newSets;
save(); openW(wi);
}

// ===== EXPORT =====
function exportData(){
let blob=new Blob([JSON.stringify(data)],{type:"application/json"});
let a=document.createElement('a');
a.href=URL.createObjectURL(blob);
a.download='workouts.json';
a.click();
}

// ===== IMPORT =====
function importData(){
let i=document.createElement('input');
i.type='file';
i.onchange=e=>{
let r=new FileReader();
r.onload=x=>{
data=JSON.parse(x.target.result);
save(); home();
};
r.readAsText(e.target.files[0]);
};
i.click();
}

// ===== START =====
home();

</script>
</body>
</html>
