<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Журнал тренировок</title>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <style>
    :root{
      --bg:#f2f2f7;
      --card:#ffffff;
      --text:#111111;
      --muted:#6e6e73;
      --blue:#007aff;
      --green:#34c759;
      --red:#ff3b30;
      --yellow:#ffcc00;
      --soft:#e5e5ea;
      --soft2:#f8f8fa;
      --border:#d9d9de;
      --shadow:0 4px 10px rgba(0,0,0,0.05);
      --shadow2:0 10px 22px rgba(0,0,0,0.10);
      --radius:18px;
      --nav-h:76px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      overscroll-behavior-y: contain;
    }

    .container {
      max-width: 460px;
      margin: auto;
      padding: 14px 14px calc(var(--nav-h) + 26px + env(safe-area-inset-bottom));
      min-height: 100dvh;
    }

    .stickyTop {
      position: sticky;
      top: 0;
      z-index: 20;
      background: linear-gradient(to bottom, rgba(242,242,247,.98), rgba(242,242,247,.90));
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      padding-bottom: 10px;
      margin-bottom: 6px;
    }

    .title {
      font-size: 28px;
      font-weight: 700;
      margin: 0 0 12px;
      letter-spacing: -0.02em;
    }

    .subtle {
      color: var(--muted);
      font-size: 13px;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 12px;
      box-shadow: var(--shadow);
      position: relative;
      transition: transform .16s ease, box-shadow .16s ease, opacity .16s ease;
    }

    .card:active { transform: scale(0.998); }

    .card.dragging {
      opacity: .7;
      transform: scale(1.01);
      box-shadow: var(--shadow2);
    }

    .done { background: #e8f8ee; }
    .special { background: #e6f0ff; }
    .extra { background: #e8f8ee; }

    button {
      min-height: 42px;
      padding: 8px 12px;
      border: none;
      border-radius: 12px;
      background: var(--blue);
      color: #fff;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: transform .12s ease, opacity .12s ease, background .12s ease, filter .12s ease;
    }

    button:active {
      transform: scale(0.992);
      filter: brightness(.985);
    }

    .small {
      min-height: 30px;
      font-size: 11px;
      padding: 4px 7px;
      border-radius: 9px;
    }

    .editBtn {
      opacity: .8;
      transform: scale(.78);
      transform-origin: center;
    }

    .green { background: var(--green); }
    .red { background: var(--red); }
    .yellow { background: var(--yellow); color: #000; }
    .secondary { background: var(--soft); color: #000; }

    .bigBtn {
      width: 100%;
      min-height: 48px;
      font-size: 16px;
      border-radius: 14px;
    }

    .row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    input, select, textarea {
      width: 100%;
      min-height: 44px;
      border-radius: 12px;
      border: 1px solid #d1d1d6;
      font-size: 15px;
      padding: 10px 12px;
      font-family: inherit;
      background: #fff;
      outline: none;
    }

    textarea {
      min-height: 100px;
      resize: vertical;
    }

    .helper {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.45;
    }

    .workoutColorDot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      flex: 0 0 14px;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.08);
    }

    .colorPreviewRow {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .colorPicker {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 10px;
    }

    .colorOption {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.08);
      transition: transform .12s ease;
    }

    .colorOption.active {
      border-color: #111;
      transform: scale(1.06);
    }

    .exercise-img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      border-radius: 14px;
      margin-top: 10px;
      display: block;
    }

    .setRow {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-top: 6px;
      font-size: 14px;
    }

    .plus { color: var(--green); font-weight: 700; }
    .minus { color: var(--red); font-weight: 700; }

    .infoBtn {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      cursor: pointer;
      user-select: none;
      background: #d1d1d6;
      color: #000;
    }

    .yellowBg { background: var(--yellow); color: #000; }

    .toolbar {
      display: flex;
      gap: 6px;
      margin: 10px 0;
      flex-wrap: wrap;
    }

    .toolbar button,
    .toolbar select {
      background: var(--soft);
      color: #000;
      border: none;
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 13px;
      min-height: 38px;
      width: auto;
    }

    .editor {
      border: 1px solid #d1d1d6;
      border-radius: 14px;
      padding: 14px;
      min-height: 220px;
      background: #fff;
      font-size: 16px;
      line-height: 1.55;
      outline: none;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      transition: background .22s ease;
      z-index: 999;
      padding: 0;
    }

    .modal.show {
      background: rgba(0,0,0,.3);
    }

    .modalBox {
      width: 100%;
      max-width: 460px;
      max-height: 90dvh;
      overflow: auto;
      background: #fff;
      border-radius: 22px 22px 0 0;
      padding: 16px 16px calc(18px + env(safe-area-inset-bottom));
      transform: translateY(24px);
      opacity: 0;
      transition: transform .22s ease, opacity .22s ease;
      box-shadow: 0 -10px 30px rgba(0,0,0,.12);
    }

    .modal.show .modalBox {
      transform: translateY(0);
      opacity: 1;
    }

    .modalListItem {
      background: var(--soft2);
      border-radius: 14px;
      padding: 10px 12px;
      margin-top: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .calendarWrap {
      background: #fff;
      border-radius: 18px;
      padding: 12px;
      box-shadow: var(--shadow);
    }

    .calendarHeader {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .calendarTitle {
      font-size: 18px;
      font-weight: 700;
    }

    .calendarGrid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
    }

    .weekday {
      text-align: center;
      font-size: 12px;
      color: #666;
      padding: 4px 0 6px;
      font-weight: 700;
    }

    .dayCell {
      min-height: 64px;
      background: var(--soft2);
      border-radius: 14px;
      padding: 6px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      cursor: pointer;
      border: 1px solid transparent;
      transition: transform .12s ease, border-color .12s ease;
    }

    .dayCell:active { transform: scale(0.992); }
    .dayCell:hover { border-color: var(--border); }
    .dayCell.outsideMonth { opacity: .45; }
    .dayCell.today {
      background: #eef5ff;
      border-color: var(--blue);
      box-shadow: inset 0 0 0 1px var(--blue);
    }

    .dayNumber {
      font-size: 13px;
      font-weight: 700;
      text-align: right;
    }

    .dayDots {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      align-items: center;
      min-height: 10px;
    }

    .dayDot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.08);
    }

    /* Notes */
    .notesHeader {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 12px;
    }

    .notesSearch {
      width: 100%;
      margin-bottom: 10px;
    }

    .notesSegments,
    .folderWrap,
    .tagWrap {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .chip {
      border: none;
      background: #eef1f5;
      color: #333;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
      cursor: pointer;
      min-height: 38px;
      transition: transform .12s ease, opacity .12s ease;
    }

    .chip:active { transform: scale(.992); }

    .chip.active {
      background: #111;
      color: #fff;
    }

    .viewSwitch {
      display: flex;
      gap: 6px;
    }

    .viewSwitch button.active {
      background: #111;
      color: #fff;
    }

    .notesGrid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .notesList {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .swipeWrap {
      position: relative;
      overflow: hidden;
      border-radius: 18px;
      margin-bottom: 12px;
    }

    .swipeAction {
      position: absolute;
      top: 0;
      right: 0;
      width: 82px;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,59,48,.14);
      color: rgba(255,59,48,.65);
      font-size: 18px;
      user-select: none;
    }

    .swipeMain {
      position: relative;
      z-index: 2;
      transition: transform .16s ease;
      will-change: transform;
      touch-action: pan-y;
    }

    .noteCard {
      background: #fff;
      border-radius: 18px;
      padding: 14px;
      position: relative;
      box-shadow: var(--shadow);
      transition: transform .16s ease, box-shadow .16s ease;
      cursor: pointer;
      animation: noteFade .18s ease;
      margin-bottom: 0;
    }

    @keyframes noteFade {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .noteCard:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(0,0,0,.08);
    }

    .noteCardTitle {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 6px;
      padding-right: 84px;
      line-height: 1.3;
    }

    .noteCardPreview {
      font-size: 13px;
      color: #555;
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 5;
      -webkit-box-orient: vertical;
      overflow: hidden;
      min-height: 38px;
    }

    .noteCardMeta {
      font-size: 12px;
      color: #888;
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .noteCardActions {
      position: absolute;
      top: 12px;
      right: 12px;
      display: flex;
      gap: 6px;
    }

    .notePill {
      display: inline-block;
      background: #f0f1f5;
      color: #444;
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 999px;
    }

    .folderManageRow {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      background: var(--soft2);
      border-radius: 14px;
      padding: 10px 12px;
      margin-top: 8px;
    }

    .notesFab {
      position: fixed;
      right: 18px;
      bottom: calc(var(--nav-h) + 12px + env(safe-area-inset-bottom));
      width: 58px;
      height: 58px;
      border-radius: 50%;
      font-size: 28px;
      line-height: 1;
      box-shadow: 0 10px 24px rgba(0,122,255,.24);
      z-index: 40;
    }

    .noteReadBlock {
      font-size: 16px;
      line-height: 1.65;
      color: #222;
      background: #fff;
      border: 1px solid #ececef;
      border-radius: 16px;
      padding: 16px;
      white-space: normal;
      word-break: break-word;
    }

    .bottomNav {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 30;
      background: rgba(255,255,255,.96);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid rgba(0,0,0,.06);
      padding: 8px 12px calc(8px + env(safe-area-inset-bottom));
    }

    .bottomNavInner {
      max-width: 460px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap: 6px;
    }

    .lifeLockScreen {
      min-height: 65dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 18px;
    }

    .lifeLockIcon {
      font-size: 44px;
      line-height: 1;
    }

    .pinDots {
      display: flex;
      gap: 14px;
      justify-content: center;
      margin: 4px 0;
    }

    .pinDot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #d1d1d6;
      transition: background .14s ease, transform .14s ease;
    }

    .pinDot.filled {
      background: #111;
      transform: scale(1.05);
    }

    .pinHiddenInput {
      position: absolute;
      opacity: 0;
      pointer-events: none;
      width: 1px;
      height: 1px;
    }

    .lifeCard {
      background: #fff;
      border-radius: 20px;
      padding: 18px;
      box-shadow: var(--shadow);
      text-align: center;
    }

    .unknownWorkoutDot {
      background:#8e8e93;
    }

    .bottomNav button {
      min-height: 52px;
      border-radius: 16px;
      background: transparent;
      color: #444;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      font-size: 12px;
      font-weight: 600;
    }

    .bottomNav button.activeTab {
      background: #111;
      color: #fff;
    }

    @media (min-width: 760px) {
      .notesGrid {
        grid-template-columns: 1fr 1fr;
      }
      .modal {
        align-items: center;
        padding: 16px;
      }
      .modalBox {
        max-width: 760px;
        border-radius: 22px;
        transform: translateY(18px);
      }
      .notesFab {
        bottom: 24px;
      }
    }
  
    .pinDot.error {
      background: #ff3b30;
      transform: scale(1.12);
    }

    .pinDot.success {
      background: #34c759;
      transform: scale(1.12);
    }

    .pinDots.shake {
      animation: pinShake .28s ease;
    }

    @keyframes pinShake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-7px); }
      75% { transform: translateX(7px); }
    }

    .lifePlanWrap {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .planBlock {
      position: relative;
      overflow: hidden;
      background: #fff;
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 16px;
      min-height: 84px;
    }

    .planBlock.bigPlan {
      min-height: 112px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .planBlockFill {
      position: absolute;
      inset: 0;
      width: var(--fill, 0%);
      background: linear-gradient(90deg, rgba(255,45,85,.34), rgba(52,199,89,.42));
      transition: width .25s ease;
      pointer-events: none;
    }

    .planBlockContent {
      position: relative;
      z-index: 2;
    }

    .planTitle {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -.01em;
    }

    .planTitleLarge {
      font-size: 24px;
      font-weight: 850;
      letter-spacing: -.02em;
    }

    .planPercent {
      margin-top: 4px;
      font-size: 13px;
      color: #555;
      font-weight: 600;
    }

    .planSectionGrid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .planSubTitle {
      font-size: 15px;
      font-weight: 800;
      margin: 8px 0 6px;
      text-align: center;
    }

    .lifeItemGrid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .lifeItemCell {
      position: relative;
      overflow: hidden;
      background: #fff;
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 12px;
    }

    .lifeItemCell.done {
      box-shadow: 0 4px 14px rgba(52,199,89,.16);
    }

    .lifeItemTop {
      position: relative;
      z-index: 2;
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
    }

    .lifeItemName {
      flex: 1;
      min-height: 40px;
      border-radius: 12px;
      font-size: 14px;
      background: rgba(255,255,255,.82);
    }

    .lifeItemMeta {
      position: relative;
      z-index: 2;
      margin-top: 6px;
      font-size: 12px;
      color: #666;
      line-height: 1.35;
    }

    @media (min-width: 760px) {
      .planSectionGrid { grid-template-columns: 1fr 1fr 1fr; }
      .lifeItemGrid { grid-template-columns: 1fr 1fr; }
    }

  </style>
</head>
<body>
  <div class="container" id="app"></div>

  <div class="bottomNav">
    <div class="bottomNavInner" id="bottomNav"></div>
  </div>

  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyCGrNDdXDuUxlPhI0V2g7X7C679j2Vq7_8",
      authDomain: "workout-app-80e26.firebaseapp.com",
      projectId: "workout-app-80e26"
    });
    const db = firebase.firestore();

    let data = JSON.parse(localStorage.getItem('workouts')) || [];
    let calendarData = JSON.parse(localStorage.getItem('calendarData')) || {};
    let notesData = JSON.parse(localStorage.getItem('notesData')) || [];
    let notesFolders = JSON.parse(localStorage.getItem('notesFolders')) || [];
    let notesPrefs = JSON.parse(localStorage.getItem('notesPrefs')) || {
      view: 'grid',
      section: 'all',
      currentFolderId: 'all',
      currentTag: 'all'
    };

    let cw = null;
    let ce = null;
    let temp = [];
    let dragW = null;
    let dragE = null;
    let suppressNextSnapshot = false;
    let currentTab = 'notes';
    let calendarCursor = new Date();
    let notesSearch = '';
    let noteAutosaveTimer = null;
    let currentlySwipedId = null;
    let lifeUnlocked = false;
    let lifePinInput = '';
    let lifePinStatus = 'idle';
    const LIFE_PIN = '511133';
    let lifeData = JSON.parse(localStorage.getItem('lifeData')) || {};

    const workoutColors = [
      '#007aff',
      '#34c759',
      '#ff3b30',
      '#ffcc00',
      '#af52de',
      '#ff9500',
      '#5ac8fa',
      '#8e8e93'
    ];

    function saveLocal() {
      localStorage.setItem('workouts', JSON.stringify(data));
      localStorage.setItem('calendarData', JSON.stringify(calendarData));
      localStorage.setItem('notesData', JSON.stringify(notesData));
      localStorage.setItem('notesFolders', JSON.stringify(notesFolders));
      localStorage.setItem('notesPrefs', JSON.stringify(notesPrefs));
      localStorage.setItem('lifeData', JSON.stringify(lifeData));
    }

    function saveCloud() {
      suppressNextSnapshot = true;

      const payload = {
        workouts: Array.isArray(data) ? data : [],
        calendarData: (calendarData && typeof calendarData === 'object') ? calendarData : {},
        notesData: Array.isArray(notesData) ? notesData : [],
        notesFolders: Array.isArray(notesFolders) ? notesFolders : [],
        notesPrefs: (notesPrefs && typeof notesPrefs === 'object') ? notesPrefs : {},
        lifeData: (lifeData && typeof lifeData === 'object') ? lifeData : {},
        updatedAt: Date.now()
      };

      return db.collection("users").doc("main").set(payload, { merge: true }).catch((err) => {
        suppressNextSnapshot = false;
        console.error("Firebase save error:", err);
      });
    }

    function save() {
      saveLocal();
      return saveCloud();
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text ?? '';
      return div.innerHTML;
    }

    function fmt(cmd, value = null) {
      document.execCommand(cmd, false, value);
    }

    function stripHtml(html) {
      const div = document.createElement('div');
      div.innerHTML = html || '';
      return div.textContent || div.innerText || '';
    }

    function formatDateTime(ts) {
      if (!ts) return '';
      return new Date(ts).toLocaleString('ru-RU', {
        day: '2-digit',
        month: '2-digit',
        year: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function normalizeTags(list) {
      if (Array.isArray(list)) return list.map(t => String(t).trim()).filter(Boolean);
      return [];
    }

    function ensureWorkoutIds() {
      let changed = false;
      data.forEach(w => {
        if (!w.id) {
          w.id = 'w_' + Math.random().toString(36).slice(2) + Date.now().toString(36);
          changed = true;
        }
        if (!w.color) {
          w.color = '#8e8e93';
          changed = true;
        }
      });
      if (changed) save();
    }

    function ensureDefaultFolder() {

    function sumLife(items, doneOnly = false) {
      return items.reduce((sum, item) => {

        return sum + item.total;

    }

    function pct(value, total) {
      if (!total) return 0;
      return Math.max(0, Math.min(100, (value / total) * 100));
    }

    function fmtPct(value) {
      return Number(value || 0).toLocaleString('ru-RU', {

    /* ------------- Generic swipe ------------- */

    function closeAllSwipes() {
      document.querySelectorAll('.swipeMain').forEach(el => {
        el.style.transform = 'translateX(0px)';
      });
      currentlySwipedId = null;
    }

    function attachSwipeables() {
      document.querySelectorAll('.swipeMain').forEach(el => {
        if (el.dataset.swipeReady === '1') return;
        el.dataset.swipeReady = '1';

        let startX = 0;
        let currentX = 0;
        let swiping = false;
        const maxLeft = -82;
        const id = el.dataset.swipeId;

        el.addEventListener('touchstart', e => {
          startX = e.touches[0].clientX;
          currentX = 0;
          swiping = true;
          if (currentlySwipedId && currentlySwipedId !== id) closeAllSwipes();
        }, { passive: true });

        el.addEventListener('touchmove', e => {
          if (!swiping) return;
          const dx = e.touches[0].clientX - startX;
          if (dx < 0) {
            currentX = Math.max(maxLeft, dx);
            el.style.transform = `translateX(${currentX}px)`;
          } else if (currentlySwipedId === id) {
            currentX = Math.min(0, maxLeft + dx);
            el.style.transform = `translateX(${currentX}px)`;
          }
        }, { passive: true });

        el.addEventListener('touchend', () => {
          if (!swiping) return;
          swiping = false;
          if (currentX < -38) {
            el.style.transform = `translateX(${maxLeft}px)`;
            currentlySwipedId = id;
          } else {
            el.style.transform = `translateX(0px)`;
            if (currentlySwipedId === id) currentlySwipedId = null;
          }
        });
      });
    }

    document.addEventListener('click', (e) => {
      if (!e.target.closest('.swipeWrap') && currentlySwipedId) {
        closeAllSwipes();
      }
    }, true);

    function swipeWrap(id, content, deleteAction) {

          </div>
        </div>
      `;
    }

    function filteredNotes() {
      let items = [...notesData];

      if (notesPrefs.section === 'favorites') {
        items = items.filter(n => n.favorite);
      }

      if (notesPrefs.currentFolderId !== 'all') {
        items = items.filter(n => n.folderId === notesPrefs.currentFolderId);
      }

      if (notesPrefs.currentTag !== 'all') {
        items = items.filter(n => (n.tags || []).includes(notesPrefs.currentTag));
      }

      if (notesSearch.trim()) {
        const q = notesSearch.trim().toLowerCase();
        items = items.filter(n => {
          const hay = `${n.title} ${stripHtml(n.content)} ${(n.tags || []).join(' ')} ${folderNameById(n.folderId)}`.toLowerCase();
          return hay.includes(q);
        });
      }

      items.sort((a, b) => {
        if (!!b.pinned !== !!a.pinned) return Number(b.pinned) - Number(a.pinned);
        return (b.updatedAt || 0) - (a.updatedAt || 0);
      });

      return items;
    }

    function renameFolder(folderId) {
      const folder = notesFolders.find(f => f.id === folderId);
      if (!folder) return;
      const name = prompt('Название папки', folder.name);
      if (!name || !name.trim()) return;
      folder.name = name.trim();
      save();
      renderNotes();
    }

    function deleteFolder(folderId) {
      const folder = notesFolders.find(f => f.id === folderId);
      if (!folder) return;

      const fallback = notesFolders.find(f => f.id !== folderId);
      if (!fallback) {
        alert('Должна остаться хотя бы одна папка.');
        return;
      }

      if (!confirm(`Точно удалить папку "${folder.name}"? Заметки будут перенесены в "${fallback.name}".`)) return;

      notesData.forEach(n => {
        if (n.folderId === folderId) n.folderId = fallback.id;
      });

      notesFolders = notesFolders.filter(f => f.id !== folderId);

      if (notesPrefs.currentFolderId === folderId) {
        notesPrefs.currentFolderId = 'all';

      save();
      renderNotes();
    }

          <select id="noteFolderSelect" style="flex:1" onchange="queueNoteAutosave('${note.id}')">
            ${notesFolders.map(f => `<option value="${f.id}" ${note.folderId === f.id ? 'selected' : ''}>${escapeHtml(f.name)}</option>`).join('')}
          </select>
          <input id="noteTagsInput" placeholder="Теги через запятую" style="flex:1" value="${escapeHtml((note.tags || []).join(', '))}" oninput="queueNoteAutosave('${note.id}')">
        </div>

        <div class="toolbar">
          <button onclick="fmt('bold')">B</button>
          <button onclick="fmt('italic')">I</button>
          <button onclick="fmt('underline')">U</button>
          <button onclick="insertHeading()">H</button>
          <button onclick="insertBulletList()">•</button>
          <button onclick="insertChecklist()">☑︎</button>
        </div>

        <div contenteditable="true" class="editor" id="noteContentEditor" oninput="queueNoteAutosave('${note.id}')">${note.content || ''}</div>

        <div class="row">
          <button class="green" onclick="saveNoteFromModal('${note.id}')">Сохранить</button>
          <button class="secondary" onclick="togglePinNoteFromEditor('${note.id}')">${note.pinned ? 'Открепить' : 'Закрепить'}</button>
          <button class="secondary" onclick="toggleFavoriteNoteFromEditor('${note.id}')">${note.favorite ? 'Убрать ★' : 'В избранное'}</button>
        </div>

        <div class="helper">Автосохранение включено</div>

          Создано: ${escapeHtml(formatDateTime(note.createdAt))}<br>
          Изменено: ${escapeHtml(formatDateTime(note.updatedAt))}

      `);
    }

    function saveNoteFromModal(noteId, silent = false) {
      const title = document.getElementById('noteTitleInput')?.value?.trim() || '';
      const folderId = document.getElementById('noteFolderSelect')?.value || (notesFolders[0]?.id || 'fld_default');
      const tags = (document.getElementById('noteTagsInput')?.value || '')
        .split(',')
        .map(t => t.trim())
        .filter(Boolean);
      const content = document.getElementById('noteContentEditor')?.innerHTML || '';

      const existing = notesData.find(n => n.id === noteId);

      if (existing) {
        existing.title = title || 'Без названия';
        existing.folderId = folderId;
        existing.tags = tags;
        existing.content = content;
        existing.updatedAt = Date.now();
      } else {
        notesData.push({
          id: noteId,
          title: title || 'Без названия',
          folderId,
          tags,
          content,
          pinned: false,
          favorite: false,
          createdAt: Date.now(),
          updatedAt: Date.now()
        });
      }

      save();

      if (!silent) {
        closeTopModal();
        renderNotes();
      }
    }

    function togglePinNoteFromEditor(noteId) {
      const existing = notesData.find(n => n.id === noteId);
      if (existing) {
        existing.pinned = !existing.pinned;
        existing.updatedAt = Date.now();
      } else {
        saveNoteFromModal(noteId, true);
        const note = notesData.find(n => n.id === noteId);
        if (note) note.pinned = true;
      }
      save();
      openNoteEditor(noteId);
    }

    function toggleFavoriteNoteFromEditor(noteId) {
      const existing = notesData.find(n => n.id === noteId);
      if (existing) {
        existing.favorite = !existing.favorite;
        existing.updatedAt = Date.now();
      } else {
        saveNoteFromModal(noteId, true);
        const note = notesData.find(n => n.id === noteId);
        if (note) note.favorite = true;
      }
      save();
      openNoteEditor(noteId);
    }

    function togglePinNote(noteId) {
      const note = notesData.find(n => n.id === noteId);
      if (!note) return;
      note.pinned = !note.pinned;
      note.updatedAt = Date.now();
      save();
      if (document.querySelector('.modal')) {
        openNoteView(noteId);
      } else {
        renderNotes();
      }
    }

    function toggleFavoriteNote(noteId) {
      const note = notesData.find(n => n.id === noteId);
      if (!note) return;
      note.favorite = !note.favorite;
      note.updatedAt = Date.now();
      save();
      if (document.querySelector('.modal')) {
        openNoteView(noteId);
      } else {
        renderNotes();
      }
    }

    function deleteNote(noteId) {
      if (!confirm('Точно удалить заметку?')) return;
      notesData = notesData.filter(n => n.id !== noteId);
      save();
      closeTopModal();
      renderNotes();
    }

    function deleteWorkout(i) {
      const workout = data[i];
      if (!workout) return;
      if (!confirm(`Точно удалить тренировку "${workout.name}"?`)) return;

      const workoutId = workout.id;
      data.splice(i, 1);

      Object.keys(calendarData).forEach(key => {
        calendarData[key] = (calendarData[key] || []).filter(entry => entry.workoutId !== workoutId);
        if (!calendarData[key].length) delete calendarData[key];
      });

      save();
      home();

      app.innerHTML = `

    /* ---------------- CALENDAR ---------------- */

    function formatDayKey(y, m, d) {
      const safeDate = new Date(y, m, d);
      const yy = safeDate.getFullYear();
      const mm = String(safeDate.getMonth() + 1).padStart(2, '0');
      const dd = String(safeDate.getDate()).padStart(2, '0');
      return `${yy}-${mm}-${dd}`;
    }

    function monthTitle(date) {
      const months = [
        'Январь', 'Февраль', 'Март', 'Апрель', 'Май', 'Июнь',
        'Июль', 'Август', 'Сентябрь', 'Октябрь', 'Ноябрь', 'Декабрь'
      ];
      return `${months[date.getMonth()]} ${date.getFullYear()}`;
    }

    function changeMonth(delta) {
      calendarCursor = new Date(calendarCursor.getFullYear(), calendarCursor.getMonth() + delta, 1);
      renderCalendar();
    }

    function buildDayDots(entries) {
      return entries.map(entry => {
        if (entry.type === 'unknown') {
          return `<div class="dayDot unknownWorkoutDot" style="background:#8e8e93"></div>`;
        }

        const workout = data.find(w => w.id === entry.workoutId);
        if (!workout) return '';
        return `<div class="dayDot" style="background:${workout.color || '#8e8e93'}"></div>`;
      }).join('');
    }

    function renderCalendar() {
      currentTab = 'calendar';
      renderBottomNav();
      const app = document.getElementById('app');

      const year = calendarCursor.getFullYear();
      const month = calendarCursor.getMonth();
      const first = new Date(year, month, 1);
      const last = new Date(year, month + 1, 0);

      let firstWeekDay = first.getDay();
      if (firstWeekDay === 0) firstWeekDay = 7;
      const leadingDays = firstWeekDay - 1;

      const daysInMonth = last.getDate();
      const prevMonthLast = new Date(year, month, 0).getDate();

      const today = new Date();
      const todayKey = formatDayKey(today.getFullYear(), today.getMonth(), today.getDate());

      const weekLabels = ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Вс'];
      const weekHeader = weekLabels.map(d => `<div class="weekday">${d}</div>`).join('');

      let cells = '';

      for (let i = leadingDays - 1; i >= 0; i--) {
        const day = prevMonthLast - i;
        const prevKey = formatDayKey(year, month - 1, day);
        const prevDots = buildDayDots(calendarData[prevKey] || []);
        cells += `
          <div class="dayCell outsideMonth" onclick="openDay('${prevKey}')">
            <div class="dayNumber">${day}</div>
            <div class="dayDots">${prevDots}</div>
          </div>
        `;
      }

      for (let day = 1; day <= daysInMonth; day++) {
        const key = formatDayKey(year, month, day);
        const dots = buildDayDots(calendarData[key] || []);
        const todayClass = key === todayKey ? ' today' : '';
        cells += `
          <div class="dayCell${todayClass}" onclick="openDay('${key}')">
            <div class="dayNumber">${day}</div>
            <div class="dayDots">${dots}</div>
          </div>
        `;
      }

      const used = leadingDays + daysInMonth;
      const trailing = used % 7 === 0 ? 0 : 7 - (used % 7);

      for (let day = 1; day <= trailing; day++) {
        const nextKey = formatDayKey(year, month + 1, day);
        const nextDots = buildDayDots(calendarData[nextKey] || []);
        cells += `
          <div class="dayCell outsideMonth" onclick="openDay('${nextKey}')">
            <div class="dayNumber">${day}</div>
            <div class="dayDots">${nextDots}</div>
          </div>
        `;
      }

      app.innerHTML = `
        ${renderTopHeader('Календарь')}
        <div class="calendarWrap">
          <div class="calendarHeader">
            <button class="secondary" onclick="changeMonth(-1)">←</button>
            <div class="calendarTitle">${monthTitle(calendarCursor)}</div>
            <button class="secondary" onclick="changeMonth(1)">→</button>
          </div>

          <div class="calendarGrid">
            ${weekHeader}
            ${cells}
          </div>
        </div>
      `;
    }

    function renderDayModal(key) {
      const entries = calendarData[key] || [];

      const existingHtml = entries.length
        ? entries.map((entry, idx) => {
            if (entry.type === 'unknown') {
              return swipeWrap(
                `cal_${key}_${idx}`,
                `
                  <div class="modalListItem">
                    <div style="display:flex;align-items:center;gap:8px">
                      <div class="workoutColorDot" style="background:#8e8e93"></div>
                      <span>Тренировка</span>
                    </div>
                  </div>
                `,
                `removeWorkoutFromDay('${key}', ${idx})`
              );
            }

            const workout = data.find(w => w.id === entry.workoutId);
            if (!workout) return '';
            return swipeWrap(
              `cal_${key}_${idx}`,
              `
                <div class="modalListItem">
                  <div style="display:flex;align-items:center;gap:8px">
                    <div class="workoutColorDot" style="background:${workout.color || '#8e8e93'}"></div>
                    <span>${escapeHtml(workout.name)}</span>
                  </div>
                </div>
              `,
              `removeWorkoutFromDay('${key}', ${idx})`
            );
          }).join('')
        : `<div class="helper">На этот день пока ничего не добавлено.</div>`;

      const options = data.length
        ? data.map((w, i) => `
            <div class="modalListItem">
              <div style="display:flex;align-items:center;gap:8px">
                <div class="workoutColorDot" style="background:${w.color || '#8e8e93'}"></div>
                <span>${escapeHtml(w.name)}</span>
              </div>
              <button onclick="addWorkoutToDay('${key}', ${i})">Добавить</button>
            </div>
          `).join('')
        : `<div class="helper">Сначала добавь тренировки.</div>`;

      openCustomModal(`
        <div class="title" style="font-size:20px;margin-bottom:8px">День ${key}</div>
        <div class="helper">Добавленные тренировки</div>
        ${existingHtml}
        <div class="helper" style="margin-top:12px">Выбрать тренировку</div>
        <div class="modalListItem">
          <div style="display:flex;align-items:center;gap:8px">
            <div class="workoutColorDot" style="background:#8e8e93"></div>
            <span>Просто тренировка</span>
          </div>
          <button onclick="addUnknownWorkoutToDay('${key}')">Добавить</button>
        </div>
        ${options}
      `);
      attachSwipeables();
    }

    function openDay(key) {
      renderDayModal(key);
    }

    function addWorkoutToDay(key, workoutIndex) {
      const workout = data[workoutIndex];
      if (!workout) return;

      ensureWorkoutIds();

      if (!calendarData[key]) calendarData[key] = [];
      calendarData[key].push({
        workoutId: workout.id,
        addedAt: Date.now()
      });

      save();
      renderDayModal(key);
      renderCalendar();
    }

    function addUnknownWorkoutToDay(key) {
      if (!calendarData[key]) calendarData[key] = [];

      calendarData[key].push({
        type: 'unknown',
        addedAt: Date.now()
      });

      save();
      renderDayModal(key);
      renderCalendar();
    }

    function removeWorkoutFromDay(key, entryIndex) {
      if (!calendarData[key]) return;
      if (!confirm('Точно удалить запись из календаря?')) return;

      calendarData[key].splice(entryIndex, 1);
      if (!calendarData[key].length) delete calendarData[key];

      save();
      renderDayModal(key);
      renderCalendar();
    }

    /* ---------------- MODALS / IMPORT / EXPORT ---------------- */

    function openModal(title, render, add) {
      const modal = document.createElement('div');
      modal.className = 'modal';

      modal.innerHTML = `
        <div class="modalBox">
          <b>${escapeHtml(title)}</b>
          <div id="list"></div>

          <div class="row">
            <input id="w" placeholder="Вес" style="flex:1" />
            <input id="r" placeholder="Повторы" style="flex:1" />
            <button id="addBtn">+</button>
          </div>

          <div class="row">
            <button class="secondary" onclick="closeModal(this)">Закрыть</button>
          </div>
        </div>
      `;

      modal.addEventListener('click', (e) => {
        if (e.target === modal) {
          modal.classList.remove('show');
          setTimeout(() => modal.remove(), 180);
        }
      });

      document.body.appendChild(modal);

      requestAnimationFrame(() => {
        modal.classList.add('show');
      });

      modal.querySelector('#addBtn').onclick = add;
      render();
    }

    function openCustomModal(html) {
      let modal = document.querySelector('.modal');
      if (!modal) {
        modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `<div class="modalBox"></div>`;

        modal.addEventListener('click', (e) => {
          if (e.target === modal) {
            modal.classList.remove('show');
            setTimeout(() => modal.remove(), 180);
          }
        });

        document.body.appendChild(modal);
        requestAnimationFrame(() => {
          modal.classList.add('show');
        });
      }

      const box = modal.querySelector('.modalBox');
      box.innerHTML = `
        ${html}
        <div class="row">
          <button class="secondary" onclick="closeModal(this)">Закрыть</button>
        </div>
      `;
    }

    function closeModal(btn) {
      const modal = btn.closest('.modal');
      if (!modal) return;
      modal.classList.remove('show');
      setTimeout(() => modal.remove(), 180);
    }

    function closeTopModal() {
      const modal = document.querySelector('.modal');
      if (!modal) return;
      modal.classList.remove('show');
      setTimeout(() => modal.remove(), 180);
    }

    function exportData() {
      const payload = {
        workouts: data,
        calendarData: calendarData,
        notesData: notesData,
        notesFolders: notesFolders,
        notesPrefs: notesPrefs,
        lifeData: lifeData
      };
      const blob = new Blob([JSON.stringify(payload)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);

      const a = document.createElement('a');
      a.href = url;
      a.download = 'workouts.json';
      a.click();

      URL.revokeObjectURL(url);
    }

    function importData() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'application/json';

      input.onchange = function (e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function (event) {
          try {
            const parsed = JSON.parse(event.target.result);

            if (Array.isArray(parsed)) {
              data = parsed;
              calendarData = {};
              notesData = [];
              notesFolders = [];
            } else {
              data = parsed.workouts || [];
              calendarData = parsed.calendarData || {};
              notesData = parsed.notesData || [];
              notesFolders = parsed.notesFolders || [];
              notesPrefs = parsed.notesPrefs || notesPrefs;
              lifeData = parsed.lifeData || {};
            }

            ensureWorkoutIds();
            migrateNotesSystem();
            save();
            renderNotes();
          } catch (err) {
            alert('Ошибка файла');
          }
        };

        reader.readAsText(file);
      };

      input.click();
    }

    renderBottomNav();
    ensureWorkoutIds();
    migrateNotesSystem();
    renderNotes();
  </script>
</body>
</html>
