<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout Ultimate</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body{font-family:-apple-system;background:#f2f2f7;margin:0}
.container{max-width:420px;margin:auto;padding:16px}

.card{
background:#fff;
border-radius:16px;
padding:12px;
margin-bottom:12px;
box-shadow:0 4px 10px rgba(0,0,0,.05);
position:relative;
}

.done{background:#e8f8ee}

button{
padding:6px 8px;
border:none;
border-radius:8px;
background:#007aff;
color:#fff;
}

.green{background:#34c759}
.red{background:#ff3b30}
.yellow{background:#ffcc00;color:#000}
.gray{background:#ccc;color:#000}

.row{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.exercise-img{width:100%;height:150px;object-fit:cover;border-radius:12px;margin-top:8px}

.modal{
position:fixed;inset:0;
background:rgba(0,0,0,.3);
display:flex;align-items:center;justify-content:center;
}

.modalBox{
background:#fff;padding:16px;border-radius:16px;width:90%;
animation:pop .2s ease;
}

@keyframes pop{
from{transform:scale(.9);opacity:0}
to{transform:scale(1);opacity:1}
}

.setRow{display:flex;justify-content:space-between}
.up{color:#34c759}
.down{color:#ff3b30}

.infoBtn{
position:absolute;
top:8px;
right:8px;
width:24px;height:24px;
border-radius:50%;
display:flex;align-items:center;justify-content:center;
font-weight:bold;
}
</style>
</head>

<body>
<div class="container" id="app"></div>

<script>

// ===== FIREBASE =====
firebase.initializeApp({
apiKey:"AIzaSyCGrNDdXDuUxlPhI0V2g7X7C679j2Vq7_8",
authDomain:"workout-app-80e26.firebaseapp.com",
projectId:"workout-app-80e26"
});
const db=firebase.firestore();

// ===== DATA =====
let data=JSON.parse(localStorage.getItem('workouts'))||[];
let dragW=null,dragE=null;

// ===== SAVE =====
function save(){
localStorage.setItem('workouts',JSON.stringify(data));
db.collection("users").doc("main").set({workouts:data});
}

// ===== SYNC =====
db.collection("users").doc("main").onSnapshot(doc=>{
if(!doc.exists)return;
let cloud=doc.data().workouts||[];
if(JSON.stringify(cloud)!==JSON.stringify(data)){
data=cloud;
localStorage.setItem('workouts',JSON.stringify(data));
home();
}
});

// ===== HOME =====
function home(){
app.innerHTML=`
<h2>Тренировки</h2>
<div id="list"></div>

<input id="nw"><button onclick="addW()">+</button>

<div class="row">
<button onclick="exportData()">Экспорт</button>
<button onclick="importData()">Импорт</button>
</div>
`;

let list=document.getElementById('list');

data.forEach((w,i)=>{
let d=document.createElement('div');
d.className='card '+(w.done?'done':'');
d.draggable=true;

d.ondragstart=()=>dragW=i;
d.ondrop=()=>{
if(dragW===i)return;
let m=data.splice(dragW,1)[0];
data.splice(i,0,m);
save();home();
};
d.ondragover=e=>e.preventDefault();

d.innerHTML=`
<b>${w.name}</b>

<div class="row">
<button onclick="openW(${i})">Открыть</button>
<button class="green" onclick="done(${i})">✔</button>
<button class="red" onclick="undone(${i})">✖</button>
<button class="red" onclick="delW(${i})">🗑</button>
</div>
`;

list.appendChild(d);
});
}

// ===== WORKOUT =====
function openW(wi){
let w=data[wi];

app.innerHTML=`
<button onclick="home()">←</button>
<h2>${w.name}</h2>
<div id="list"></div>

<button onclick="addE(${wi})">Добавить упражнение</button>
`;

let list=document.getElementById('list');

w.exercises.forEach((e,ei)=>{

let setsHTML='';
(e.sets||[]).forEach((s,i)=>{
let newS=e.newSets?.[i];
let diff='';
if(newS){
let ow=parseInt(s),nw=parseInt(newS);
if(nw>ow)diff='<span class="up">↑</span>';
if(nw<ow)diff='<span class="down">↓</span>';
}
setsHTML+=`<div class="setRow">${s} ${newS||''} ${diff}</div>`;
});

let infoColor=e.info?'yellow':'gray';

let d=document.createElement('div');
d.className='card';

d.innerHTML=`
<b>${e.name}</b>

<div class="infoBtn ${infoColor}" onclick="toggleInfo(${wi},${ei})">!</div>

${e.img?`<img src="${e.img}" class="exercise-img">`:''}

${setsHTML}

<div class="row">
<button onclick="openSets(${wi},${ei})">Подходы</button>
<button class="yellow" onclick="openNew(${wi},${ei})">Новый</button>
${e.newSets?`<button class="green" onclick="saveRes(${wi},${ei})">Сохранить</button>`:''}
</div>

${e.showInfo?`
<div contenteditable="true" id="info${ei}" style="border:1px solid #ccc;padding:8px;border-radius:8px;margin-top:8px">${e.info||''}</div>
<button onclick="saveInfo(${wi},${ei})">Сохранить текст</button>
`:''}
`;

list.appendChild(d);
});
}

// ===== МОДАЛКИ =====
function openSets(wi,ei){
let ex=data[wi].exercises[ei];
let temp=[...(ex.sets||[])];

modal(`
<h3>Подходы</h3>
<div id="list"></div>

<input id="w"><input id="r">
<button onclick="add()">+</button>
`,render);

function render(){
let l=document.getElementById('list');
l.innerHTML='';
temp.forEach((s,i)=>{
l.innerHTML+=`${s} <button onclick="del(${i})">x</button><br>`;
});
}

window.add=()=>{
let w=document.getElementById('w').value;
let r=document.getElementById('r').value;
temp.push(w+'x'+r);
ex.sets=temp;
save();render();openW(wi);
};

window.del=i=>{
temp.splice(i,1);
ex.sets=temp;
save();render();openW(wi);
};
}

function openNew(wi,ei){
let ex=data[wi].exercises[ei];
let temp=[...(ex.newSets||[])];

modal(`<h3>Новый результат</h3>
<div id="list"></div>
<input id="w"><input id="r">
<button onclick="add()">+</button>`,render);

function render(){
let l=document.getElementById('list');
l.innerHTML='';
temp.forEach((s,i)=>{
l.innerHTML+=`${s} <button onclick="del(${i})">x</button><br>`;
});
}

window.add=()=>{
let w=document.getElementById('w').value;
let r=document.getElementById('r').value;
temp.push(w+'x'+r);
ex.newSets=temp.length?temp:null;
save();render();openW(wi);
};

window.del=i=>{
temp.splice(i,1);
ex.newSets=temp.length?temp:null;
save();render();openW(wi);
};
}

// ===== MODAL =====
function modal(content,cb){
let m=document.createElement('div');
m.className='modal';
m.innerHTML=`<div class="modalBox">${content}<br><button onclick="this.closest('.modal').remove()">Закрыть</button></div>`;
document.body.appendChild(m);
setTimeout(cb,0);
}

// ===== OTHER =====
function addW(){let v=nw.value;if(!v)return;data.push({name:v,exercises:[]});save();home();}
function delW(i){if(confirm('Удалить?')){data.splice(i,1);save();home();}}
function done(i){data[i].done=true;save();home();}
function undone(i){delete data[i].done;save();home();}
function addE(wi){data[wi].exercises.push({name:'Упражнение',sets:[]});save();openW(wi);}
function saveRes(wi,ei){let e=data[wi].exercises[ei];e.sets=e.newSets;delete e.newSets;save();openW(wi);}
function toggleInfo(wi,ei){let e=data[wi].exercises[ei];e.showInfo=!e.showInfo;save();openW(wi);}
function saveInfo(wi,ei){data[wi].exercises[ei].info=document.getElementById('info'+ei).innerHTML;save();}

// ===== EXPORT =====
function exportData(){
let blob=new Blob([JSON.stringify(data)],{type:"application/json"});
let a=document.createElement('a');
a.href=URL.createObjectURL(blob);
a.download='workouts.json';
a.click();
}

// ===== IMPORT =====
function importData(){
let i=document.createElement('input');
i.type='file';
i.onchange=e=>{
let r=new FileReader();
r.onload=x=>{
data=JSON.parse(x.target.result);
save();home();
};
r.readAsText(e.target.files[0]);
};
i.click();
}

// ===== START =====
home();

</script>
</body>
</html>
