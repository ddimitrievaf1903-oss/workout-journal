<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body{font-family:-apple-system;background:#f2f2f7;margin:0}
.container{max-width:420px;margin:auto;padding:16px}

.card{
background:#fff;
border-radius:16px;
padding:12px;
margin-bottom:12px;
position:relative;
}

.done{background:#e8f8ee}

.row{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}

button{padding:6px 8px;border:none;border-radius:8px;background:#007aff;color:#fff}
.green{background:#34c759}
.red{background:#ff3b30}
.yellow{background:#ffcc00;color:#000}
.gray{background:#ccc;color:#000}

.drag{
position:absolute;
left:8px;
top:8px;
cursor:grab;
opacity:.5;
}

input{padding:8px;border-radius:8px;border:1px solid #ccc;width:100%}

.modal{
position:fixed;inset:0;
background:rgba(0,0,0,.3);
display:flex;align-items:center;justify-content:center;
}

.modalBox{
background:#fff;padding:16px;border-radius:16px;width:90%;
}

.setRow{display:flex;justify-content:space-between;margin-top:4px}

.exercise-img{
width:100%;height:150px;object-fit:cover;border-radius:12px;margin-top:8px;
}

.infoBtn{
position:absolute;
right:8px;
top:8px;
width:24px;height:24px;border-radius:50%;
display:flex;align-items:center;justify-content:center;font-weight:bold;
}

.up{color:#34c759}
.down{color:#ff3b30}
</style>
</head>

<body>
<div class="container" id="app"></div>

<script>

window.onload=()=>{

firebase.initializeApp({
apiKey:"AIzaSyCGrNDdXDuUxlPhI0V2g7X7C679j2Vq7_8",
authDomain:"workout-app-80e26.firebaseapp.com",
projectId:"workout-app-80e26"
});

const db=firebase.firestore();

let data=JSON.parse(localStorage.getItem('workouts'))||[];
let dragIndex=null;

// ===== SAVE =====
function save(){
localStorage.setItem('workouts',JSON.stringify(data));
db.collection("users").doc("main").set({workouts:data});
}

// ===== SYNC =====
db.collection("users").doc("main").onSnapshot(doc=>{
if(!doc.exists)return;
let cloud=doc.data().workouts||[];

if(JSON.stringify(cloud)!==JSON.stringify(data)){
data=cloud;
localStorage.setItem('workouts',JSON.stringify(data));
home();
}
});

// ===== DRAG (ТОЛЬКО ЗА РУЧКУ) =====
function dragInit(list,arr,render){

let items=list.children;

for(let i=0;i<items.length;i++){

let handle=items[i].querySelector('.drag');

handle.onmousedown=()=>{
dragIndex=i;

document.onmouseup=(e)=>{
let el=document.elementFromPoint(e.clientX,e.clientY)?.closest('.card');
if(!el)return;

let children=[...list.children];
let to=children.indexOf(el);

if(to!==dragIndex){
let m=arr.splice(dragIndex,1)[0];
arr.splice(to,0,m);
save();
render();
}

document.onmouseup=null;
};
};

}
}

// ===== HOME =====
function home(){

app.innerHTML=`
<h2>Тренировки</h2>
<div id="list"></div>

<input id="nw">
<button onclick="addW()">+</button>
`;

let list=document.getElementById('list');

data.forEach((w,i)=>{

let d=document.createElement('div');
d.className='card '+(w.done?'done':'');

d.innerHTML=`
<div class="drag">≡</div>

<b>${w.name}</b>

<div class="row">
<button onclick="openW(${i})">Открыть</button>
<button onclick="editW(${i})">✏️</button>
<button class="green" onclick="done(${i})">✔</button>
<button class="red" onclick="undone(${i})">✖</button>
<button class="red" onclick="delW(${i})">🗑</button>
</div>
`;

list.appendChild(d);
});

dragInit(list,data,home);
}

// ===== WORKOUT =====
function openW(wi){

let w=data[wi];

app.innerHTML=`
<button onclick="home()">←</button>
<h2>${w.name}</h2>
<div id="list"></div>

<button onclick="addE(${wi})">Добавить</button>
<button onclick="addE(${wi},'special')">Особое</button>
<button onclick="addE(${wi},'extra')">Доп</button>
`;

let list=document.getElementById('list');

w.exercises.forEach((e,ei)=>{

let bg=e.special?'background:#d0e7ff':e.extra?'background:#d4f8d4':'';

let html='';
let max=Math.max(e.sets?.length||0,e.newSets?.length||0);

for(let i=0;i<max;i++){
let oldS=e.sets?.[i]||'';
let newS=e.newSets?.[i]||'';

let diff='';
if(oldS&&newS){
let ow=parseFloat(oldS);
let nw=parseFloat(newS);
if(nw>ow) diff='↑';
if(nw<ow) diff='↓';
}

html+=`
<div class="setRow">
<span>${oldS?`Подход ${i+1}: ${oldS}`:''}</span>
<span>${newS||''} ${diff}</span>
</div>`;
}

let d=document.createElement('div');
d.className='card';
d.style=bg;

d.innerHTML=`
<div class="drag">≡</div>

<b>${e.name}</b>

<div class="infoBtn ${e.info?'yellow':'gray'}" onclick="toggleInfo(${wi},${ei})">!</div>

<button onclick="editE(${wi},${ei})">✏️</button>
<button class="red" onclick="delE(${wi},${ei})">🗑</button>

${e.img?`<img src="${e.img}" class="exercise-img">`:''}

${html}

<div class="row">
<button onclick="openSets(${wi},${ei})">Подходы</button>
<button onclick="openNew(${wi},${ei})">Новый</button>
${e.newSets?.length?`<button onclick="saveRes(${wi},${ei})">Сохранить</button>`:''}
</div>

${e.showInfo?`
<div contenteditable="true" id="info${ei}">${e.info||''}</div>
<button onclick="saveInfo(${wi},${ei})">Сохранить</button>
`:''}
`;

list.appendChild(d);

});

dragInit(list,w.exercises,()=>openW(wi));
}

// ===== ВСЕ ФУНКЦИИ =====
function addW(){let v=nw.value;if(!v)return;data.push({name:v,exercises:[]});save();home();}
function editW(i){let n=prompt('Название',data[i].name);if(n){data[i].name=n;save();home();}}
function delW(i){if(confirm('Удалить?')){data.splice(i,1);save();home();}}

function done(i){data[i].done=true;save();home();}
function undone(i){delete data[i].done;save();home();}

function addE(wi,type){
data[wi].exercises.push({name:'Упражнение',sets:[],special:type==='special',extra:type==='extra'});
save();openW(wi);
}

function editE(wi,ei){
let e=data[wi].exercises[ei];
let n=prompt('Название',e.name);
let img=prompt('Фото',e.img||'');
if(n){e.name=n;e.img=img||'';save();openW(wi);}
}

function delE(wi,ei){
if(confirm('Удалить?')){
data[wi].exercises.splice(ei,1);
save();openW(wi);
}
}

// ===== INFO =====
function toggleInfo(wi,ei){
let e=data[wi].exercises[ei];
e.showInfo=!e.showInfo;
save();openW(wi);
}

function saveInfo(wi,ei){
data[wi].exercises[ei].info=document.getElementById('info'+ei).innerHTML;
save();
}

// ===== MODAL =====
function modal(content,cb){
let m=document.createElement('div');
m.className='modal';
m.innerHTML=`<div class="modalBox">${content}<br><button onclick="this.closest('.modal').remove()">Закрыть</button></div>`;
document.body.appendChild(m);
setTimeout(cb,0);
}

// ===== SETS =====
function openSets(wi,ei){
let ex=data[wi].exercises[ei];
let temp=[...(ex.sets||[])];

modal(`<h3>Подходы</h3><div id="list"></div>
<input id="w"><input id="r"><button onclick="add()">+</button>`,render);

function render(){
let l=document.getElementById('list');
l.innerHTML='';
temp.forEach((s,i)=>l.innerHTML+=`Подход ${i+1}: ${s} <button onclick="del(${i})">x</button><br>`);
}

window.add=()=>{
let w=document.getElementById('w').value;
let r=document.getElementById('r').value;
temp.push(w+'x'+r);
ex.sets=temp;
save();render();openW(wi);
};

window.del=i=>{
temp.splice(i,1);
ex.sets=temp;
save();render();openW(wi);
};
}

// ===== NEW =====
function openNew(wi,ei){
let ex=data[wi].exercises[ei];
let temp=[...(ex.newSets||[])];

modal(`<h3>Новый результат</h3><div id="list"></div>
<input id="w"><input id="r"><button onclick="add()">+</button>`,render);

function render(){
let l=document.getElementById('list');
l.innerHTML='';
temp.forEach((s,i)=>l.innerHTML+=`Подход ${i+1}: ${s} <button onclick="del(${i})">x</button><br>`);
}

window.add=()=>{
let w=document.getElementById('w').value;
let r=document.getElementById('r').value;
temp.push(w+'x'+r);
ex.newSets=temp.length?temp:null;
save();render();openW(wi);
};

window.del=i=>{
temp.splice(i,1);
ex.newSets=temp.length?temp:null;
save();render();openW(wi);
};
}

// ===== SAVE RESULT =====
function saveRes(wi,ei){
let e=data[wi].exercises[ei];
e.sets=e.newSets;
delete e.newSets;
save();openW(wi);
}

home();

};

</script>

</body>
</html>
