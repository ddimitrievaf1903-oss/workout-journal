<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Журнал тренировок</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body{font-family:-apple-system;background:#f2f2f7;margin:0}
.container{max-width:420px;margin:auto;padding:16px}
.card{background:#fff;border-radius:16px;padding:12px;margin-bottom:12px;box-shadow:0 4px 10px rgba(0,0,0,.05)}
.exercise-img{width:100%;height:150px;object-fit:cover;border-radius:12px;margin-top:8px}
button{padding:6px 8px;border:none;border-radius:8px;background:#007aff;color:#fff}
.green{background:#34c759}
.red{background:#ff3b30}
.yellow{background:#ffcc00;color:#000}
.row{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.title{font-size:20px;font-weight:600;margin-bottom:10px}
.setRow{display:flex;justify-content:space-between;margin-top:4px}
.plus{color:#34c759}
.minus{color:#ff3b30}
</style>
</head>

<body>
<div class="container" id="app"></div>

<script>

// ===== FIREBASE =====
const firebaseConfig = {
  apiKey: "AIzaSyCGrNDdXDuUxlPhI0V2g7X7C679j2Vq7_8",
  authDomain: "workout-app-80e26.firebaseapp.com",
  projectId: "workout-app-80e26"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ===== DATA =====
let data = JSON.parse(localStorage.getItem('workouts')) || [];

// ===== SAVE =====
function save(){
  localStorage.setItem('workouts', JSON.stringify(data));

  db.collection("users").doc("main").set({
    workouts: data
  }).then(()=>{
    console.log("Синхронизировано");
  });
}

// ===== LOAD CLOUD =====
function loadCloud(){
  return db.collection("users").doc("main").get().then(doc=>{
    if(doc.exists){
      return doc.data().workouts || [];
    }
    return null;
  });
}

// ===== START =====
function startApp(){

  // мгновенный запуск
  home();

  // фоновая синхронизация
  loadCloud().then(cloud=>{
    if(cloud && JSON.stringify(cloud)!==JSON.stringify(data)){
      data = cloud;
      localStorage.setItem('workouts', JSON.stringify(data));
      home();
    }
  });

}

// ===== HOME =====
function home(){
const app=document.getElementById('app');

app.innerHTML=`
<div class="title">Тренировки</div>
<div id="list"></div>

<input id="nw" placeholder="Новая тренировка">
<button onclick="addW()">Добавить</button>

<div class="row">
<button class="green" onclick="exportData()">Экспорт</button>
<button onclick="importData()">Импорт</button>
</div>
`;

const list=document.getElementById('list');

data.forEach((w,i)=>{
const d=document.createElement('div');
d.className='card';

d.innerHTML=`
<b>${w.name}</b>
<div class="row">
<button onclick="openW(${i})">Открыть</button>
</div>
`;

list.appendChild(d);
});
}

// ===== ADD WORKOUT =====
function addW(){
let v=document.getElementById('nw').value;
if(!v)return;

data.push({name:v,exercises:[]});
save();
home();
}

// ===== OPEN WORKOUT =====
function openW(i){
let w=data[i];

const app=document.getElementById('app');

app.innerHTML=`
<button onclick="home()">← Назад</button>
<div class="title">${w.name}</div>
<div id="list"></div>

<button onclick="addE(${i})">Добавить упражнение</button>
`;

const list=document.getElementById('list');

w.exercises.forEach((e,idx)=>{

let setsHTML='';
(e.sets||[]).forEach((s,j)=>{
setsHTML+=`<div>Подход ${j+1}: ${s}</div>`;
});

const d=document.createElement('div');
d.className='card';

d.innerHTML=`
<b>${e.name}</b>
${e.img?`<img src="${e.img}" class="exercise-img">`:''}

${setsHTML}

<div class="row">
<button onclick="addSet(${i},${idx})">Подходы</button>
<button onclick="newRes(${i},${idx})">Новый результат</button>
</div>
`;

list.appendChild(d);
});
}

// ===== ADD EXERCISE =====
function addE(wi){
data[wi].exercises.push({name:'Новое упражнение',sets:[]});
save();
openW(wi);
}

// ===== ADD SET =====
function addSet(wi,ei){
let w=prompt('Вес');
let r=prompt('Повторы');

if(!w||!r)return;

data[wi].exercises[ei].sets.push(w+'x'+r);
save();
openW(wi);
}

// ===== NEW RESULT =====
function newRes(wi,ei){
let w=prompt('Вес');
let r=prompt('Повторы');

if(!w||!r)return;

data[wi].exercises[ei].sets.push(w+'x'+r);
save();
openW(wi);
}

// ===== EXPORT =====
function exportData(){
const dataStr = localStorage.getItem('workouts') || '[]';

const blob = new Blob([dataStr], {type: "application/json"});
const url = URL.createObjectURL(blob);

const a = document.createElement('a');
a.href = url;
a.download = 'workouts.json';
a.click();
}

// ===== IMPORT =====
function importData(){
const input = document.createElement('input');
input.type = 'file';

input.onchange = function(e){
const file = e.target.files[0];

const reader = new FileReader();

reader.onload = function(event){
localStorage.setItem('workouts', event.target.result);
data = JSON.parse(event.target.result);
save();
home();
};

reader.readAsText(file);
};

input.click();
}

// ===== START APP =====
startApp();

</script>
</body>
</html>
