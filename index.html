<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body{font-family:-apple-system;background:#f2f2f7;margin:0}
.container{max-width:420px;margin:auto;padding:16px}
.card{background:#fff;border-radius:16px;padding:12px;margin-bottom:12px;cursor:grab}
.exercise-img{width:100%;height:150px;object-fit:cover;border-radius:12px}
button{padding:6px 8px;border:none;border-radius:8px;background:#007aff;color:#fff}
.green{background:#34c759}
.yellow{background:#ffcc00;color:#000}
.row{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
</style>
</head>

<body>
<div class="container" id="app"></div>

<script>

// ===== FIREBASE =====
firebase.initializeApp({
  apiKey:"AIzaSy...",
  authDomain:"workout-app-80e26.firebaseapp.com",
  projectId:"workout-app-80e26"
});
const db = firebase.firestore();

// ===== DATA =====
let data = JSON.parse(localStorage.getItem('workouts')) || [];
let dragW=null;
let dragE=null;

// ===== SAVE =====
function save(){
  localStorage.setItem('workouts', JSON.stringify(data));
  db.collection("users").doc("main").set({workouts:data});
}

// ===== SYNC =====
db.collection("users").doc("main")
.onSnapshot(doc=>{
  if(!doc.exists)return;
  const cloud = doc.data().workouts || [];

  if(JSON.stringify(cloud)!==JSON.stringify(data)){
    data = cloud;
    localStorage.setItem('workouts', JSON.stringify(data));
    home();
  }
});

// ===== HOME =====
function home(){
let html=`<h2>Тренировки</h2><div id="list"></div>
<input id="nw"><button onclick="addW()">+</button>`;

document.getElementById('app').innerHTML = html;
let list = document.getElementById('list');

data.forEach((w,i)=>{
let d=document.createElement('div');
d.className='card';
d.draggable=true;

d.ondragstart=()=>dragW=i;
d.ondragover=e=>e.preventDefault();

d.ondrop=()=>{
if(dragW===i)return;
let moved=data.splice(dragW,1)[0];
data.splice(i,0,moved);
save(); home();
};

d.innerHTML=`<b>${w.name}</b><br>
<button onclick="openW(${i})">Открыть</button>`;

list.appendChild(d);
});
}

// ===== ADD WORKOUT =====
function addW(){
let v=document.getElementById('nw').value;
if(!v)return;
data.push({name:v,exercises:[]});
save(); home();
}

// ===== OPEN WORKOUT =====
function openW(wi){
let w=data[wi];

let html=`<button onclick="home()">←</button><h2>${w.name}</h2>
<div id="list"></div>

<button onclick="addE(${wi},'normal')">Добавить</button>
<button onclick="addE(${wi},'special')">Особое</button>
<button onclick="addE(${wi},'extra')">Доп</button>`;

document.getElementById('app').innerHTML=html;
let list=document.getElementById('list');

w.exercises.forEach((e,ei)=>{

let sets='';
(e.sets||[]).forEach(s=>sets+=`<div>${s}</div>`);

let newSets='';
(e.newSets||[]).forEach(s=>newSets+=`<div>${s}</div>`);

let d=document.createElement('div');
d.className='card';
d.draggable=true;

d.ondragstart=()=>dragE=ei;
d.ondragover=e=>e.preventDefault();

d.ondrop=()=>{
if(dragE===ei)return;
let moved=data[wi].exercises.splice(dragE,1)[0];
data[wi].exercises.splice(ei,0,moved);
save(); openW(wi);
};

d.innerHTML=`
<b>${e.name}</b>
${e.img?`<img src="${e.img}" class="exercise-img">`:''}

${sets}
${newSets}

<div class="row">
<button onclick="addSet(${wi},${ei})">Подходы</button>
<button class="yellow" onclick="newRes(${wi},${ei})">Новый результат</button>
${e.newSets?`<button class="green" onclick="saveRes(${wi},${ei})">Сохранить</button>`:''}
</div>
`;

list.appendChild(d);
});
}

// ===== ADD EXERCISE =====
function addE(wi,type){
data[wi].exercises.push({
name:'Упражнение',
img:'',
sets:[],
special:type=='special',
extra:type=='extra'
});
save(); openW(wi);
}

// ===== ADD SET =====
function addSet(wi,ei){
let w=prompt('Вес');
let r=prompt('Повторы');
if(!w||!r)return;

data[wi].exercises[ei].sets.push(w+'x'+r);
save(); openW(wi);
}

// ===== NEW RESULT =====
function newRes(wi,ei){
let w=prompt('Вес');
let r=prompt('Повторы');
if(!w||!r)return;

if(!data[wi].exercises[ei].newSets)
data[wi].exercises[ei].newSets=[];

data[wi].exercises[ei].newSets.push(w+'x'+r);

save(); openW(wi);
}

// ===== SAVE RESULT =====
function saveRes(wi,ei){
let ex=data[wi].exercises[ei];
ex.sets = ex.newSets;
delete ex.newSets;
save(); openW(wi);
}

// ===== START =====
home();

</script>
</body>
</html>
