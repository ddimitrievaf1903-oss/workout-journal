<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCGrNDdXDuUxlPhI0V2g7X7C679j2Vq7_8",
  authDomain: "workout-app-80e26.firebaseapp.com",
  projectId: "workout-app-80e26",
  storageBucket: "workout-app-80e26.firebasestorage.app",
  messagingSenderId: "725512607519",
  appId: "1:725512607519:web:d283decd352f5f7d7c422a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// сохранить в облако
window.saveCloud = async function(data){
  await setDoc(doc(db, "users", "main"), {
    workouts: data
  });
}

// загрузить из облака
window.loadCloud = async function(){
  const docSnap = await getDoc(doc(db, "users", "main"));
  if(docSnap.exists()){
    return docSnap.data().workouts;
  }
  return [];
}

// ЗАГРУЗКА ПРИ СТАРТЕ
(async () => {
  const cloud = await loadCloud();

  if(cloud && cloud.length){
    data = cloud;
    localStorage.setItem('workouts', JSON.stringify(data));
  }

  home();
})();
</script>
