<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Журнал тренировок</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f2f2f7;
      margin: 0;
      color: #111;
    }

    .container {
      max-width: 420px;
      margin: auto;
      padding: 16px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 12px;
      margin-bottom: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      position: relative;
      transition: transform 0.15s ease, opacity 0.15s ease, box-shadow 0.15s ease;
    }

    .card.dragging {
      opacity: 0.65;
      transform: scale(1.02);
      box-shadow: 0 10px 24px rgba(0,0,0,0.12);
    }

    .done {
      background: #e8f8ee;
    }

    .special {
      background: #e6f0ff;
    }

    .extra {
      background: #e8f8ee;
    }

    .exercise-img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 12px;
      margin-top: 8px;
      display: block;
    }

    button {
      padding: 6px 8px;
      border: none;
      border-radius: 8px;
      background: #007aff;
      color: #fff;
      cursor: pointer;
      font-size: 14px;
    }

    button:active {
      transform: scale(0.98);
    }

    .small {
      font-size: 12px;
      padding: 4px 6px;
    }

    .green {
      background: #34c759;
    }

    .red {
      background: #ff3b30;
    }

    .yellow {
      background: #ffcc00;
      color: #000;
    }

    .secondary {
      background: #e5e5ea;
      color: #000;
    }

    .bigBtn {
      width: 100%;
      padding: 12px;
      font-size: 16px;
    }

    .row {
      display: flex;
      gap: 6px;
      margin-top: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .title {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 12px;
    }

    .setRow {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-top: 4px;
      font-size: 14px;
    }

    .plus {
      color: #34c759;
      font-weight: 700;
    }

    .minus {
      color: #ff3b30;
      font-weight: 700;
    }

    .infoBtn {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      cursor: pointer;
      user-select: none;
    }

    .gray {
      background: #d1d1d6;
      color: #000;
    }

    .yellowBg {
      background: #ffcc00;
      color: #000;
    }

    .editor {
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 8px;
      min-height: 80px;
      background: #fff;
    }

    .toolbar {
      display: flex;
      gap: 4px;
      margin: 8px 0;
      flex-wrap: wrap;
    }

    .toolbar button,
    .toolbar select {
      background: #e5e5ea;
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 6px 8px;
      font-size: 13px;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s ease;
      z-index: 999;
      padding: 16px;
    }

    .modal.show {
      background: rgba(0,0,0,0.3);
    }

    .modalBox {
      background: #fff;
      padding: 16px;
      border-radius: 16px;
      width: 100%;
      max-width: 360px;
      transform: translateY(20px);
      opacity: 0;
      transition: transform 0.2s ease, opacity 0.2s ease;
      max-height: 80vh;
      overflow: auto;
    }

    .modal.show .modalBox {
      transform: translateY(0);
      opacity: 1;
    }

    input, select {
      padding: 8px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    .modalListItem {
      background: #f8f8fa;
      border-radius: 10px;
      padding: 8px 10px;
      margin-top: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }

    .tabs button.activeTab {
      background: #111;
      color: #fff;
    }

    .workoutColorDot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex: 0 0 12px;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.08);
    }

    .calendarWrap {
      background: #fff;
      border-radius: 16px;
      padding: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    .calendarHeader {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .calendarTitle {
      font-size: 18px;
      font-weight: 600;
    }

    .calendarGrid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
    }

    .weekday {
      text-align: center;
      font-size: 12px;
      color: #666;
      padding: 4px 0 6px;
      font-weight: 600;
    }

    .dayCell {
      min-height: 58px;
      background: #f8f8fa;
      border-radius: 12px;
      padding: 6px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      cursor: pointer;
      border: 1px solid transparent;
    }

    .dayCell:hover {
      border-color: #d9d9de;
    }

    .dayCell.outsideMonth {
      opacity: 0.45;
    }

    .dayCell.today {
      background: #eef5ff;
      border-color: #007aff;
      box-shadow: inset 0 0 0 1px #007aff;
    }

    .dayNumber {
      font-size: 13px;
      font-weight: 600;
      text-align: right;
    }

    .dayDots {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      justify-content: flex-start;
      align-items: center;
      min-height: 10px;
    }

    .dayDot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.08);
    }

    .modalSectionTitle {
      margin-top: 12px;
      margin-bottom: 6px;
      font-size: 14px;
      font-weight: 600;
      color: #444;
    }

    .emptyText {
      color: #777;
      font-size: 13px;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <div class="container" id="app"></div>

  <script>
    // ===== FIREBASE =====
    firebase.initializeApp({
      apiKey: "AIzaSyCGrNDdXDuUxlPhI0V2g7X7C679j2Vq7_8",
      authDomain: "workout-app-80e26.firebaseapp.com",
      projectId: "workout-app-80e26"
    });
    const db = firebase.firestore();

    // ===== DATA =====
    let data = JSON.parse(localStorage.getItem('workouts')) || [];
    let calendarData = JSON.parse(localStorage.getItem('calendarData')) || {};
    let cw = null; // current workout
    let ce = null; // current exercise
    let temp = [];
    let dragW = null;
    let dragE = null;
    let suppressNextSnapshot = false;

    let currentTab = 'workouts';
    let calendarCursor = new Date();

    const workoutColors = [
      { value: '#007aff', label: 'Синий' },
      { value: '#34c759', label: 'Зелёный' },
      { value: '#ff3b30', label: 'Красный' },
      { value: '#ffcc00', label: 'Жёлтый' },
      { value: '#af52de', label: 'Фиолетовый' },
      { value: '#ff9500', label: 'Оранжевый' },
      { value: '#5ac8fa', label: 'Голубой' },
      { value: '#8e8e93', label: 'Серый' }
    ];

    // ===== SAVE =====
    function saveLocal() {
      localStorage.setItem('workouts', JSON.stringify(data));
      localStorage.setItem('calendarData', JSON.stringify(calendarData));
    }

    function saveCloud() {
      suppressNextSnapshot = true;
      return db.collection("users").doc("main").set({
        workouts: data,
        calendarData: calendarData,
        updatedAt: Date.now()
      }).catch((err) => {
        suppressNextSnapshot = false;
        console.error("Firebase save error:", err);
      });
    }

    function save() {
      saveLocal();
      return saveCloud();
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text ?? '';
      return div.innerHTML;
    }

    function fmt(cmd, value = null) {
      document.execCommand(cmd, false, value);
    }

    // ===== SYNC =====
    db.collection("users").doc("main").onSnapshot(doc => {
      if (!doc.exists) return;

      if (suppressNextSnapshot) {
        suppressNextSnapshot = false;
        return;
      }

      const cloud = doc.data() || {};
      data = cloud.workouts || [];
      calendarData = cloud.calendarData || {};

      localStorage.setItem('workouts', JSON.stringify(data));
      localStorage.setItem('calendarData', JSON.stringify(calendarData));

      if (currentTab === 'calendar') {
        renderCalendar();
      } else if (typeof cw === "number" && data[cw]) {
        openW(cw);
      } else {
        cw = null;
        home();
      }
    }, err => {
      console.error("Firebase sync error:", err);
    });

    // ===== TABS =====
    function renderTabs() {
      return `
        <div class="tabs">
          <button class="${currentTab === 'workouts' ? 'activeTab' : 'secondary'}" onclick="showWorkouts()">Тренировки</button>
          <button class="${currentTab === 'calendar' ? 'activeTab' : 'secondary'}" onclick="showCalendar()">Календарь</button>
        </div>
      `;
    }

    function showWorkouts() {
      currentTab = 'workouts';
      cw = null;
      home();
    }

    function showCalendar() {
      currentTab = 'calendar';
      renderCalendar();
    }

    // ===== WORKOUTS HOME =====
    function home() {
      currentTab = 'workouts';
      const app = document.getElementById('app');

      const colorOptions = workoutColors.map(c => `
        <option value="${c.value}">${c.label}</option>
      `).join('');

      app.innerHTML = `
        ${renderTabs()}
        <div class="title">Тренировки</div>
        <div id="list"></div>

        <div class="row">
          <input id="nw" placeholder="Новая тренировка" style="flex:1" />
        </div>

        <div class="row">
          <select id="nwColor" style="flex:1">
            ${colorOptions}
          </select>
          <button onclick="addW()">Добавить</button>
        </div>

        <div class="row">
          <button class="green" onclick="exportData()">Экспорт</button>
          <button class="secondary" onclick="importData()">Импорт</button>
        </div>
      `;

      const list = document.getElementById('list');

      data.forEach((w, i) => {
        const d = document.createElement('div');
        d.className = 'card ' + (w.done ? 'done' : '');
        d.draggable = true;

        d.ondragstart = () => {
          dragW = i;
          d.classList.add('dragging');
        };

        d.ondragend = () => {
          d.classList.remove('dragging');
        };

        d.ondragover = (e) => e.preventDefault();

        d.ondrop = () => {
          if (dragW === null || dragW === i) return;
          const moved = data.splice(dragW, 1)[0];
          data.splice(i, 0, moved);
          dragW = null;
          save();
          home();
        };

        d.innerHTML = `
          <div style="display:flex;align-items:center;gap:8px">
            <div class="workoutColorDot" style="background:${w.color || '#007aff'}"></div>
            <b>${escapeHtml(w.name)}</b>
          </div>
          <div class="row">
            <button onclick="openW(${i})">Открыть</button>
            <button class="green small" onclick="done(${i})">✔</button>
            <button class="red small" onclick="undone(${i})">✖</button>
          </div>
        `;

        list.appendChild(d);
      });
    }

    function addW() {
      const input = document.getElementById('nw');
      const colorSelect = document.getElementById('nwColor');
      const v = input.value.trim();
      if (!v) return;

      data.push({
        name: v,
        color: colorSelect?.value || '#007aff',
        exercises: []
      });

      input.value = '';
      save();
      home();
    }

    function done(i) {
      data[i].done = true;
      save();
      home();
    }

    function undone(i) {
      delete data[i].done;
      save();
      home();
    }

    function openW(i) {
      currentTab = 'workouts';
      cw = i;
      const w = data[i];
      const app = document.getElementById('app');

      app.innerHTML = `
        ${renderTabs()}
        <button class="secondary" onclick="home()">← Назад</button>
        <div class="title">${escapeHtml(w.name)}</div>
        <div id="list"></div>

        <button class="bigBtn" onclick="addE('normal')">Добавить упражнение</button>

        <div class="row">
          <button onclick="addE('special')">Особое</button>
          <button class="green" onclick="addE('extra')">Доп</button>
        </div>
      `;

      const list = document.getElementById('list');

      w.exercises.forEach((e, i) => {
        const d = document.createElement('div');
        d.className =
          'card' +
          (e.special ? ' special' : '') +
          (e.extra ? ' extra' : '');

        d.draggable = true;

        d.ondragstart = () => {
          dragE = i;
          d.classList.add('dragging');
        };

        d.ondragend = () => {
          d.classList.remove('dragging');
        };

        d.ondragover = (ev) => ev.preventDefault();

        d.ondrop = () => {
          if (dragE === null || dragE === i) return;
          const moved = w.exercises.splice(dragE, 1)[0];
          w.exercises.splice(i, 0, moved);
          dragE = null;
          save();
          openW(cw);
        };

        let setsHTML = '';
        const max = Math.max((e.sets || []).length, (e.newSets || []).length);

        for (let j = 0; j < max; j++) {
          const l = e.sets?.[j] || '';
          const r = e.newSets?.[j] || '';
          let diff = '';

          if (l && r) {
            const lw = parseFloat(String(l).split('x')[0]) || 0;
            const rw = parseFloat(String(r).split('x')[0]) || 0;

            if (rw > lw) diff = '<span class="plus">▲</span>';
            if (rw < lw) diff = '<span class="minus">▼</span>';
          }

          setsHTML += `
            <div class="setRow">
              <span>${l ? `Подход ${j + 1}: ${escapeHtml(l)}` : ''}</span>
              <span>${escapeHtml(r)} ${diff}</span>
            </div>
          `;
        }

        const infoClass = e.info ? 'yellowBg' : 'gray';

        const infoBox = e.showInfo
          ? `
            <div class="toolbar">
              <button onclick="fmt('bold')">B</button>
              <button onclick="fmt('italic')">I</button>
              <button onclick="fmt('underline')">U</button>
              <select onchange="fmt('fontName', this.value)">
                <option value="">Шрифт</option>
                <option value="Arial">Arial</option>
                <option value="Georgia">Georgia</option>
                <option value="Courier New">Courier</option>
                <option value="Verdana">Verdana</option>
              </select>
              <select onchange="fmt('fontSize', this.value)">
                <option value="">Размер</option>
                <option value="2">Мал.</option>
                <option value="3">Сред.</option>
                <option value="5">Круп.</option>
              </select>
            </div>
            <div contenteditable="true" class="editor" id="info${i}">${e.info || ''}</div>
            <div class="row">
              <button onclick="saveInfo(${i})">Сохранить</button>
            </div>
          `
          : '';

        d.innerHTML = `
          <b>${escapeHtml(e.name)}</b>
          <button class="small" onclick="editE(${i})">✏️</button>
          <button class="red small" onclick="delE(${i})">🗑</button>

          ${e.img ? `<img src="${escapeHtml(e.img)}" class="exercise-img">` : ''}

          ${setsHTML}

          <div class="row">
            <button onclick="openSets(${i})">Подходы</button>
            <button class="yellow" onclick="newRes(${i})">Новый результат</button>
            ${(e.newSets && e.newSets.length)
              ? `<button class="green" onclick="saveRes(${i})">Сохранить</button>`
              : ''}
          </div>

          <div class="infoBtn ${infoClass}" onclick="toggleInfo(${i})">!</div>
          ${infoBox}
        `;

        list.appendChild(d);
      });
    }

    function addE(type = 'normal') {
      data[cw].exercises.push({
        name: 'Новое упражнение',
        img: '',
        sets: [],
        special: type === 'special',
        extra: type === 'extra'
      });

      save();
      openW(cw);
    }

    function editE(i) {
      const ex = data[cw].exercises[i];

      const n = prompt('Название', ex.name);
      if (!n) return;

      const img = prompt('Фото', ex.img || '');

      ex.name = n;
      ex.img = img || '';

      save();
      openW(cw);
    }

    function delE(i) {
      if (!confirm('Удалить упражнение?')) return;
      data[cw].exercises.splice(i, 1);
      save();
      openW(cw);
    }

    function openModal(title, render, add) {
      const modal = document.createElement('div');
      modal.className = 'modal';

      modal.innerHTML = `
        <div class="modalBox">
          <b>${escapeHtml(title)}</b>
          <div id="list"></div>

          <div class="row">
            <input id="w" placeholder="Вес" style="flex:1" />
            <input id="r" placeholder="Повторы" style="flex:1" />
            <button id="addBtn">+</button>
          </div>

          <div class="row">
            <button class="secondary" onclick="closeModal(this)">Закрыть</button>
          </div>
        </div>
      `;

      document.body.appendChild(modal);

      requestAnimationFrame(() => {
        modal.classList.add('show');
      });

      modal.querySelector('#addBtn').onclick = add;
      render();
    }

    function openCustomModal(html) {
      const modal = document.createElement('div');
      modal.className = 'modal';

      modal.innerHTML = `
        <div class="modalBox">
          ${html}
          <div class="row">
            <button class="secondary" onclick="closeModal(this)">Закрыть</button>
          </div>
        </div>
      `;

      document.body.appendChild(modal);

      requestAnimationFrame(() => {
        modal.classList.add('show');
      });
    }

    function closeModal(btn) {
      const modal = btn.closest('.modal');
      if (!modal) return;
      modal.classList.remove('show');
      setTimeout(() => modal.remove(), 180);
    }

    function openSets(i) {
      ce = i;
      temp = [...(data[cw].exercises[i].sets || [])];
      openModal('Подходы', renderSets, addSet);
    }

    function renderSets() {
      const list = document.querySelector('.modal #list');
      if (!list) return;

      list.innerHTML = '';

      temp.forEach((s, i) => {
        const d = document.createElement('div');
        d.className = 'modalListItem';
        d.innerHTML = `
          <span>${escapeHtml(s)}</span>
          <button onclick="delSet(${i})">🗑</button>
        `;
        list.appendChild(d);
      });
    }

    function addSet() {
      const w = document.querySelector('.modal #w')?.value;
      const r = document.querySelector('.modal #r')?.value;
      if (!w || !r) return;

      temp.push(w + 'x' + r);
      data[cw].exercises[ce].sets = [...temp];
      save();

      renderSets();
      openW(cw);
    }

    function delSet(i) {
      temp.splice(i, 1);
      data[cw].exercises[ce].sets = [...temp];
      save();

      renderSets();
      openW(cw);
    }

    function newRes(i) {
      ce = i;
      temp = [...(data[cw].exercises[i].newSets || [])];
      openModal('Новый результат', renderTemp, addTemp);
    }

    function renderTemp() {
      const list = document.querySelector('.modal #list');
      if (!list) return;

      list.innerHTML = '';

      temp.forEach((s, i) => {
        const d = document.createElement('div');
        d.className = 'modalListItem';
        d.innerHTML = `
          <span>${escapeHtml(s)}</span>
          <button onclick="delTemp(${i})">🗑</button>
        `;
        list.appendChild(d);
      });
    }

    function addTemp() {
      const w = document.querySelector('.modal #w')?.value;
      const r = document.querySelector('.modal #r')?.value;
      if (!w || !r) return;

      temp.push(w + 'x' + r);
      data[cw].exercises[ce].newSets = [...temp];
      save();

      renderTemp();
      openW(cw);
    }

    function delTemp(i) {
      temp.splice(i, 1);

      if (temp.length === 0) {
        delete data[cw].exercises[ce].newSets;
      } else {
        data[cw].exercises[ce].newSets = [...temp];
      }

      save();
      renderTemp();
      openW(cw);
    }

    function saveRes(i) {
      const ex = data[cw].exercises[i];
      if (!ex.newSets || !ex.newSets.length) return;

      ex.sets = [...ex.newSets];
      delete ex.newSets;

      save();
      openW(cw);
    }

    function toggleInfo(i) {
      data[cw].exercises[i].showInfo = !data[cw].exercises[i].showInfo;
      save();
      openW(cw);
    }

    function saveInfo(i) {
      const editor = document.getElementById('info' + i);
      if (!editor) return;

      data[cw].exercises[i].info = editor.innerHTML;
      save();
      openW(cw);
    }

    function exportData() {
      const payload = {
        workouts: data,
        calendarData: calendarData
      };
      const blob = new Blob([JSON.stringify(payload)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);

      const a = document.createElement('a');
      a.href = url;
      a.download = 'workouts.json';
      a.click();

      URL.revokeObjectURL(url);
    }

    function importData() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'application/json';

      input.onchange = function (e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function (event) {
          try {
            const content = event.target.result;
            const parsed = JSON.parse(content);

            if (Array.isArray(parsed)) {
              data = parsed;
              calendarData = {};
            } else {
              data = parsed.workouts || [];
              calendarData = parsed.calendarData || {};
            }

            save();
            home();
          } catch (err) {
            alert('Ошибка файла');
          }
        };

        reader.readAsText(file);
      };

      input.click();
    }

    // ===== CALENDAR =====
    function formatDayKey(y, m, d) {
      const mm = String(m + 1).padStart(2, '0');
      const dd = String(d).padStart(2, '0');
      return `${y}-${mm}-${dd}`;
    }

    function monthTitle(date) {
      const months = [
        'Январь', 'Февраль', 'Март', 'Апрель', 'Май', 'Июнь',
        'Июль', 'Август', 'Сентябрь', 'Октябрь', 'Ноябрь', 'Декабрь'
      ];
      return `${months[date.getMonth()]} ${date.getFullYear()}`;
    }

    function changeMonth(delta) {
      calendarCursor = new Date(calendarCursor.getFullYear(), calendarCursor.getMonth() + delta, 1);
      renderCalendar();
    }

    function renderCalendar() {
      currentTab = 'calendar';
      const app = document.getElementById('app');

      const year = calendarCursor.getFullYear();
      const month = calendarCursor.getMonth();

      const first = new Date(year, month, 1);
      const last = new Date(year, month + 1, 0);

      let firstWeekDay = first.getDay();
      if (firstWeekDay === 0) firstWeekDay = 7; // вс -> 7
      const leadingDays = firstWeekDay - 1;

      const daysInMonth = last.getDate();
      const prevMonthLast = new Date(year, month, 0).getDate();

      const today = new Date();
      const todayKey = formatDayKey(today.getFullYear(), today.getMonth(), today.getDate());

      let cells = '';

      const weekLabels = ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Вс'];
      const weekHeader = weekLabels.map(d => `<div class="weekday">${d}</div>`).join('');

      // prev month
      for (let i = leadingDays - 1; i >= 0; i--) {
        const day = prevMonthLast - i;
        cells += `
          <div class="dayCell outsideMonth">
            <div class="dayNumber">${day}</div>
            <div class="dayDots"></div>
          </div>
        `;
      }

      // current month
      for (let day = 1; day <= daysInMonth; day++) {
        const key = formatDayKey(year, month, day);
        const entries = calendarData[key] || [];
        const dots = entries.map(entry => {
          const workout = data.find(w => w.id === entry.workoutId);
          if (!workout) return '';
          return `<div class="dayDot" style="background:${workout.color || '#007aff'}"></div>`;
        }).join('');

        const todayClass = key === todayKey ? ' today' : '';

        cells += `
          <div class="dayCell${todayClass}" onclick="openDay('${key}')">
            <div class="dayNumber">${day}</div>
            <div class="dayDots">${dots}</div>
          </div>
        `;
      }

      // tail
      const used = leadingDays + daysInMonth;
      const trailing = used % 7 === 0 ? 0 : 7 - (used % 7);

      for (let day = 1; day <= trailing; day++) {
        cells += `
          <div class="dayCell outsideMonth">
            <div class="dayNumber">${day}</div>
            <div class="dayDots"></div>
          </div>
        `;
      }

      app.innerHTML = `
        ${renderTabs()}
        <div class="title">Календарь</div>

        <div class="calendarWrap">
          <div class="calendarHeader">
            <button class="secondary" onclick="changeMonth(-1)">←</button>
            <div class="calendarTitle">${monthTitle(calendarCursor)}</div>
            <button class="secondary" onclick="changeMonth(1)">→</button>
          </div>

          <div class="calendarGrid">
            ${weekHeader}
            ${cells}
          </div>
        </div>
      `;
    }

    function openDay(key) {
      const entries = calendarData[key] || [];

      const existingHtml = entries.length
        ? entries.map((entry, idx) => {
            const workout = data.find(w => w.id === entry.workoutId);
            if (!workout) return '';
            return `
              <div class="modalListItem">
                <div style="display:flex;align-items:center;gap:8px">
                  <div class="workoutColorDot" style="background:${workout.color || '#007aff'}"></div>
                  <span>${escapeHtml(workout.name)}</span>
                </div>
                <button class="red" onclick="removeWorkoutFromDay('${key}', ${idx})">🗑</button>
              </div>
            `;
          }).join('')
        : `<div class="emptyText">На этот день пока ничего не добавлено.</div>`;

      const options = data.length
        ? data.map((w, i) => `
            <div class="modalListItem">
              <div style="display:flex;align-items:center;gap:8px">
                <div class="workoutColorDot" style="background:${w.color || '#007aff'}"></div>
                <span>${escapeHtml(w.name)}</span>
              </div>
              <button onclick="addWorkoutToDay('${key}', ${i})">Добавить</button>
            </div>
          `).join('')
        : `<div class="emptyText">Сначала добавь тренировки в листе «Тренировки».</div>`;

      openCustomModal(`
        <div class="title" style="font-size:18px;margin-bottom:8px">День ${key}</div>
        <div class="modalSectionTitle">Добавленные тренировки</div>
        ${existingHtml}
        <div class="modalSectionTitle">Выбрать тренировку</div>
        ${options}
      `);
    }

    function ensureWorkoutIds() {
      let changed = false;
      data.forEach(w => {
        if (!w.id) {
          w.id = 'w_' + Math.random().toString(36).slice(2) + Date.now().toString(36);
          changed = true;
        }
      });
      if (changed) save();
    }

    function addWorkoutToDay(key, workoutIndex) {
      const workout = data[workoutIndex];
      if (!workout) return;

      ensureWorkoutIds();

      if (!calendarData[key]) calendarData[key] = [];

      calendarData[key].push({
        workoutId: workout.id,
        addedAt: Date.now()
      });

      save();
      openDay(key);
      renderCalendar();
    }

    function removeWorkoutFromDay(key, entryIndex) {
      if (!calendarData[key]) return;
      calendarData[key].splice(entryIndex, 1);

      if (calendarData[key].length === 0) {
        delete calendarData[key];
      }

      save();
      openDay(key);
      renderCalendar();
    }

    // ===== START =====
    ensureWorkoutIds();
    home();
  </script>
</body>
</html>
