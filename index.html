<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Журнал тренировок</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body{font-family:-apple-system;background:#f2f2f7;margin:0}
.container{max-width:420px;margin:auto;padding:16px}
.card{background:#fff;border-radius:16px;padding:12px;margin-bottom:12px}
button{padding:6px 8px;border:none;border-radius:8px;background:#007aff;color:#fff}
.green{background:#34c759}
.row{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.title{font-size:20px;font-weight:600;margin-bottom:10px}
</style>
</head>

<body>

<div class="container" id="app"></div>

<script>

// ===== FIREBASE =====
const firebaseConfig = {
  apiKey: "AIzaSyCGrNDdXDuUxlPhI0V2g7X7C679j2Vq7_8",
  authDomain: "workout-app-80e26.firebaseapp.com",
  projectId: "workout-app-80e26"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ===== DATA =====
let data = JSON.parse(localStorage.getItem('workouts')) || [];

// ===== SAVE =====
function save(){
  localStorage.setItem('workouts', JSON.stringify(data));

  db.collection("users").doc("main").set({
    workouts: data
  }).then(()=>{
    console.log("SYNC OK");
  });
}

// ===== LIVE SYNC =====
function startApp(){

  // мгновенный запуск
  home();

  // слушаем изменения из Firebase
  db.collection("users").doc("main")
    .onSnapshot((doc)=>{

      if(!doc.exists) return;

      const cloud = doc.data().workouts || [];

      if(JSON.stringify(cloud)!==JSON.stringify(data)){
        data = cloud;
        localStorage.setItem('workouts', JSON.stringify(data));
        home();
      }

    });

}

// ===== HOME =====
function home(){
const app=document.getElementById('app');

app.innerHTML=`
<div class="title">Тренировки</div>
<div id="list"></div>

<input id="nw" placeholder="Новая тренировка">
<button onclick="addW()">Добавить</button>
`;

const list=document.getElementById('list');

data.forEach((w,i)=>{
const d=document.createElement('div');
d.className='card';

d.innerHTML=`
<b>${w.name}</b>
<div class="row">
<button onclick="openW(${i})">Открыть</button>
</div>
`;

list.appendChild(d);
});
}

// ===== ADD WORKOUT =====
function addW(){
let v=document.getElementById('nw').value;
if(!v)return;

data.push({name:v,exercises:[]});
save();
home();
}

// ===== OPEN WORKOUT =====
function openW(i){
let w=data[i];

const app=document.getElementById('app');

app.innerHTML=`
<button onclick="home()">← Назад</button>
<div class="title">${w.name}</div>
<div id="list"></div>

<button onclick="addE(${i})">Добавить упражнение</button>
`;

const list=document.getElementById('list');

w.exercises.forEach((e,idx)=>{

let setsHTML='';
(e.sets||[]).forEach((s,j)=>{
setsHTML+=`<div>Подход ${j+1}: ${s}</div>`;
});

const d=document.createElement('div');
d.className='card';

d.innerHTML=`
<b>${e.name}</b>
${setsHTML}

<div class="row">
<button onclick="addSet(${i},${idx})">Подходы</button>
<button onclick="newRes(${i},${idx})">Новый результат</button>
</div>
`;

list.appendChild(d);
});
}

// ===== ADD EXERCISE =====
function addE(wi){
data[wi].exercises.push({name:'Новое упражнение',sets:[]});
save();
openW(wi);
}

// ===== ADD SET =====
function addSet(wi,ei){
let w=prompt('Вес');
let r=prompt('Повторы');

if(!w||!r)return;

data[wi].exercises[ei].sets.push(w+'x'+r);
save();
openW(wi);
}

// ===== NEW RESULT =====
function newRes(wi,ei){
let w=prompt('Вес');
let r=prompt('Повторы');

if(!w||!r)return;

data[wi].exercises[ei].sets.push(w+'x'+r);
save();
openW(wi);
}

// ===== START =====
startApp();

</script>

</body>
</html>
